<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>WA Legislation</title>
<meta name="description" content="WA criminal legislation — fast offline reference. 23 Acts, verbatim text, one tap away.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Legislation">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f4f7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0b0e">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
/* ============ WA Legislation — Cupertino glass v2 ============ */
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{touch-action:manipulation;-webkit-text-size-adjust:100%}
:root{
  --ui:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Inter,system-ui,sans-serif;
  --serif:ui-serif,"New York",Charter,"Iowan Old Style",Georgia,serif;
  --r-lg:22px;--r-md:16px;--r-sm:12px;
  --ease:cubic-bezier(.32,.72,0,1);
  --dock-h:64px;
  --fs:1;
  --sab:env(safe-area-inset-bottom,0px);--sat:env(safe-area-inset-top,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
:root,[data-theme=light]{
  color-scheme:light;
  --bg:#f3f4f7;
  --wash-a:rgba(73,161,245,.06);--wash-b:rgba(56,142,222,.035);--wash-c:rgba(33,87,137,.03);
  --surface:rgba(255,255,255,.74);--surface-2:rgba(255,255,255,.6);--solid:#ffffff;
  --paper:#fdfdfc;
  --text:#16181d;--text-2:#4d5563;--text-3:#5b6372;
  --hairline:rgba(60,60,67,.12);--hairline-2:rgba(60,60,67,.07);
  --accent:#3b6cf6;--accent-deep:#2f56c9;--accent-tint:rgba(59,108,246,.1);
  --shadow:0 1px 2px rgba(22,24,29,.04),0 8px 24px rgba(22,24,29,.06);
  --shadow-lg:0 2px 6px rgba(22,24,29,.05),0 18px 50px rgba(22,24,29,.12);
  --pen-bg:rgba(213,72,92,.07);--pen-line:rgba(213,72,92,.22);--pen-text:#a82c40;
  --sum-bg:rgba(176,138,62,.09);--sum-line:rgba(176,138,62,.26);--sum-text:#7d5e1d;
  --mark:rgba(59,108,246,.16);
  --dock-bg:rgba(252,252,253,.66);
  --field:rgba(118,118,128,.10);
}
[data-theme=dark]{
  color-scheme:dark;
  --bg:#0a0b0e;
  --wash-a:rgba(73,161,245,.075);--wash-b:rgba(44,114,179,.05);--wash-c:rgba(26,65,102,.05);
  --surface:rgba(28,30,36,.72);--surface-2:rgba(36,38,45,.6);--solid:#17191e;
  --paper:#141519;
  --text:#f0f1f4;--text-2:#abb2bf;--text-3:#828a9a;
  --hairline:rgba(255,255,255,.1);--hairline-2:rgba(255,255,255,.05);
  --accent:#7a95ff;--accent-deep:#9db1ff;--accent-tint:rgba(122,149,255,.14);
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  --shadow-lg:0 2px 6px rgba(0,0,0,.4),0 18px 50px rgba(0,0,0,.5);
  --pen-bg:rgba(229,97,116,.1);--pen-line:rgba(229,97,116,.3);--pen-text:#ef8d9c;
  --sum-bg:rgba(205,166,86,.1);--sum-line:rgba(205,166,86,.3);--sum-text:#dfbd76;
  --mark:rgba(122,149,255,.28);
  --dock-bg:rgba(22,24,29,.62);
  --field:rgba(118,118,128,.22);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme]){
    color-scheme:dark;
    --bg:#0a0b0e;
    --wash-a:rgba(73,161,245,.075);--wash-b:rgba(44,114,179,.05);--wash-c:rgba(26,65,102,.05);
    --surface:rgba(28,30,36,.72);--surface-2:rgba(36,38,45,.6);--solid:#17191e;
    --paper:#141519;
    --text:#f0f1f4;--text-2:#abb2bf;--text-3:#828a9a;
    --hairline:rgba(255,255,255,.1);--hairline-2:rgba(255,255,255,.05);
    --accent:#7a95ff;--accent-deep:#9db1ff;--accent-tint:rgba(122,149,255,.14);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
    --shadow-lg:0 2px 6px rgba(0,0,0,.4),0 18px 50px rgba(0,0,0,.5);
    --pen-bg:rgba(229,97,116,.1);--pen-line:rgba(229,97,116,.3);--pen-text:#ef8d9c;
    --sum-bg:rgba(205,166,86,.1);--sum-line:rgba(205,166,86,.3);--sum-text:#dfbd76;
    --mark:rgba(122,149,255,.28);
    --dock-bg:rgba(22,24,29,.62);
    --field:rgba(118,118,128,.22);
  }
}
html,body{margin:0;padding:0}
body{
  font-family:var(--ui);background:var(--bg);color:var(--text);
  font-size:calc(16px*var(--fs));line-height:1.5;
  min-height:100dvh;overflow-x:hidden;
  font-synthesis:none;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;
}
body::before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(1200px 800px at 85% -10%,var(--wash-a),transparent 60%),
    radial-gradient(900px 700px at -15% 25%,var(--wash-b),transparent 55%),
    radial-gradient(1000px 900px at 70% 110%,var(--wash-c),transparent 60%),
    var(--bg);
}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;text-align:left}
a{color:var(--accent);text-decoration:none}
::selection{background:var(--mark)}
:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:8px}
.skip{position:fixed;left:-9999px;top:8px;z-index:200;background:var(--solid);color:var(--accent);
  padding:10px 16px;border-radius:12px;box-shadow:var(--shadow-lg);font-weight:600}
.skip:focus{left:8px}

/* ---------- shell ---------- */
#app{display:flex;min-height:100dvh}
#sidebar{display:none}
#main{flex:1;min-width:0;display:flex;flex-direction:column}
.view{display:none;flex:1;width:100%;max-width:720px;margin:0 auto;
  padding:calc(var(--sat) + 10px) calc(18px + var(--sar)) calc(var(--dock-h) + var(--sab) + 36px) calc(18px + var(--sal));
  animation:viewin .3s var(--ease)}
.view.active{display:block}
@keyframes viewin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){
  .view{animation:none}*{transition-duration:.01ms!important;animation-duration:.01ms!important;scroll-behavior:auto!important}
}

/* ---------- headers ---------- */
.lg-head{padding:20px 2px 6px}
.lg-head .eyebrow{font-size:.8125em;font-weight:600;color:var(--text-3);letter-spacing:.02em;text-transform:uppercase;margin:0 0 2px}
.lg-head h1{font-size:2.05em;font-weight:800;letter-spacing:-.022em;margin:0;line-height:1.12}
.lg-head .sub{margin:7px 0 0;color:var(--text-2);font-size:.95em}
.head-row{display:flex;align-items:flex-start;gap:10px}
.head-row .lg-head{flex:1;min-width:0}
.head-actions{display:flex;gap:6px;padding-top:24px}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:8px;
  margin:0 calc(-18px - var(--sar)) 0 calc(-18px - var(--sal));
  padding:calc(var(--sat) + 8px) calc(12px + var(--sar)) 8px calc(12px + var(--sal));
  background:transparent;transition:background .25s,box-shadow .25s;min-height:48px}
.topbar.stuck{background:var(--dock-bg);-webkit-backdrop-filter:blur(20px) saturate(1.8);backdrop-filter:blur(20px) saturate(1.8);
  box-shadow:0 1px 0 var(--hairline)}
.topbar .tb-title{flex:1;min-width:0;text-align:center;font-weight:650;font-size:.95em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity .2s}
.topbar.stuck .tb-title{opacity:1}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;
  border-radius:50%;color:var(--accent);transition:transform .15s var(--ease),background .15s;flex:none}
.icon-btn:active{transform:scale(.9);background:var(--accent-tint)}
.icon-btn svg{width:22px;height:22px}
.back-btn{display:inline-flex;align-items:center;gap:2px;color:var(--accent-deep);font-weight:550;
  font-size:1em;padding:8px 10px 8px 4px;border-radius:12px;min-height:44px;white-space:nowrap}
.back-btn:active{opacity:.55}
.back-btn svg{width:22px;height:22px;flex:none}
.back-btn span{max-width:130px;overflow:hidden;text-overflow:ellipsis}

/* ---------- cards / rows ---------- */
.card{background:var(--surface);-webkit-backdrop-filter:blur(20px) saturate(1.6);backdrop-filter:blur(20px) saturate(1.6);
  border:1px solid var(--hairline-2);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden}
.list{display:flex;flex-direction:column}
.row{display:flex;align-items:center;gap:13px;padding:13px 16px;min-height:54px;width:100%;
  position:relative;transition:background .12s}
.row + .row::before,.row + .res-row::before{content:"";position:absolute;top:0;left:62px;right:0;height:1px;background:var(--hairline-2)}
.row.no-badge + .row.no-badge::before{left:16px}
.row:active{background:var(--accent-tint)}
.row .chev{margin-left:auto;flex:none;color:var(--text-3);width:16px;height:16px}
.row .chev svg{width:16px;height:16px;display:block}
.row .r-main{flex:1;min-width:0}
.row .r-title{font-weight:550;font-size:.98em;line-height:1.3;display:block}
.row .r-sub{color:var(--text-2);font-size:.83em;margin-top:2px;display:block;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{flex:none;display:inline-flex;align-items:center;justify-content:center;
  min-width:36px;height:32px;padding:0 8px;border-radius:9px;
  font-weight:650;font-size:.78em;letter-spacing:-.005em;font-variant-numeric:tabular-nums;
  border:1px solid color-mix(in srgb,var(--hue) 28%,transparent);
  background:color-mix(in srgb,var(--hue) 6%,transparent);color:color-mix(in srgb,var(--hue) 58%,var(--text) 42%)}
[data-theme=dark] .badge{border-color:color-mix(in srgb,var(--hue) 36%,transparent);
  background:color-mix(in srgb,var(--hue) 14%,transparent);color:color-mix(in srgb,var(--hue) 62%,var(--text) 38%)}
.badge.act-badge{font-size:.72em;letter-spacing:.02em}

/* part/group accordion */
.part-card{margin:9px 0;border-radius:var(--r-lg)}
.part-head{display:flex;align-items:center;gap:13px;width:100%;padding:15px 16px}
.part-head:active{background:var(--accent-tint)}
.part-dot{flex:none;width:10px;height:38px;border-radius:6px;background:var(--hue)}
.part-label{font-size:.78em;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:color-mix(in srgb,var(--hue) 62%,var(--text) 38%)}
.part-title{font-weight:650;font-size:1em;letter-spacing:-.01em;line-height:1.25;display:block}
.part-meta{color:var(--text-3);font-size:.82em;margin-top:1px}
.part-chev{margin-left:auto;color:var(--text-3);width:18px;height:18px;transition:transform .25s var(--ease);flex:none}
.part-chev svg{width:18px;height:18px;display:block}
.part-card.open .part-chev{transform:rotate(90deg)}
.part-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s var(--ease)}
.part-card.open .part-body{grid-template-rows:1fr}
.part-body>div{overflow:hidden}
.div-label{padding:12px 16px 4px;font-size:.74em;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--text-3)}

/* ---------- search field ---------- */
.field{display:flex;align-items:center;gap:8px;background:var(--field);
  border-radius:14px;padding:0 13px;min-height:48px;margin:14px 0 8px;position:relative}
.home-hero .field{min-height:52px;background:var(--surface);border:1px solid var(--hairline-2);
  box-shadow:var(--shadow);-webkit-backdrop-filter:blur(20px) saturate(1.6);backdrop-filter:blur(20px) saturate(1.6)}
.home-hero .field input{height:52px}
.field .kbd-in{display:none;margin-left:auto;flex:none;color:var(--text-3);font-size:.72em;
  background:var(--field);border-radius:6px;padding:3px 7px;font-weight:600;pointer-events:none}
@media(hover:hover) and (min-width:820px){ .field:not(.has-q) .kbd-in{display:inline-block} }
.field>svg{width:18px;height:18px;color:var(--text-3);flex:none}
.field input{flex:1;min-width:0;background:none;border:0;outline:0;font:inherit;font-size:16px;
  color:var(--text);height:48px}
.field input::placeholder{color:var(--text-3)}
.field .clear{display:none;width:34px;height:34px;margin-right:-6px;border-radius:50%;color:var(--text-3);flex:none}
.field .clear svg{width:16px;height:16px;margin:auto;display:block}
.field.has-q .clear{display:inline-flex;align-items:center;justify-content:center}
.kbd-hint{display:none}
.scopes{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 8px;margin:0 -2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.scopes::-webkit-scrollbar{display:none}
.scope{flex:none;padding:6.5px 13px;border-radius:999px;font-size:.82em;font-weight:600;color:var(--text-2);
  background:var(--field);transition:all .15s;min-height:32px}
.scope.on{background:var(--accent);color:#fff}
[data-theme=dark] .scope.on{color:#0c1020}
.scope .n{opacity:.65;font-weight:500}

/* ---------- home ---------- */
.brandbar{display:flex;align-items:center;gap:10px;padding:18px 2px 0}
.brandbar .mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#49A1F5,#215789);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.3em;font-family:var(--serif);flex:none}
.brandbar .t{font-weight:800;font-size:1.32em;letter-spacing:-.02em;line-height:1.1}
.brandbar .s{display:block;font-size:.72em;color:var(--text-3);font-weight:550;letter-spacing:.03em;text-transform:uppercase;margin-top:1px}
.brandbar .gear{margin-left:auto}
.sec-label{margin:22px 4px 8px;font-size:.8em;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);display:flex;align-items:center;gap:8px}
.sec-label .more-link{margin-left:auto;color:var(--accent-deep);text-transform:none;letter-spacing:0;font-size:1.04em;font-weight:600;padding:4px 6px;border-radius:8px}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:9px}
.tile{display:flex;align-items:center;gap:11px;min-width:0;background:var(--surface);border:1px solid var(--hairline-2);
  -webkit-backdrop-filter:blur(20px) saturate(1.6);backdrop-filter:blur(20px) saturate(1.6);
  border-radius:var(--r-md);box-shadow:var(--shadow);padding:12px 13px;min-height:60px;
  transition:transform .15s var(--ease),background .15s}
.tile:active{transform:scale(.97);background:var(--accent-tint)}
.tile .ic{flex:none;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--hue) 14%,transparent);color:color-mix(in srgb,var(--hue) 65%,var(--text) 35%)}
.tile .ic svg{width:19px;height:19px}
.tile .tx{flex:1;min-width:0}
.tile .t{font-weight:650;font-size:.92em;letter-spacing:-.01em;line-height:1.2;display:block}
.tile .d{display:none}
.acts-card .row .r-title{font-size:.95em}
.act-dot{flex:none;width:10px;height:10px;border-radius:50%;background:var(--hue);margin-left:3px}
.loadpill{display:flex;align-items:center;gap:8px;margin:10px 2px;padding:9px 14px;border-radius:12px;
  background:var(--accent-tint);color:var(--accent-deep);font-size:.85em;font-weight:600;width:fit-content}
.loadpill .spin{width:14px;height:14px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .8s linear infinite;flex:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- topic page ---------- */
.cluster{margin:14px 0 4px}
.cluster-h{margin:0 4px 7px;font-size:.8em;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3)}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.tchip{display:inline-flex;align-items:center;gap:8px;max-width:100%;padding:8px 12px 8px 8px;border-radius:13px;
  background:var(--surface);border:1px solid var(--hairline-2);box-shadow:var(--shadow);min-height:44px;
  transition:transform .15s var(--ease),background .15s}
.tchip:active{transform:scale(.97);background:var(--accent-tint)}
.tchip .nb{flex:none;display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:28px;padding:0 6px;
  border-radius:8px;font-weight:700;font-size:.74em;font-variant-numeric:tabular-nums;
  background:color-mix(in srgb,var(--hue) 14%,transparent);color:color-mix(in srgb,var(--hue) 60%,var(--text) 40%)}
.tchip .tt{font-size:.86em;font-weight:550;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tchip .cnt{flex:none;font-size:.72em;color:var(--text-3);font-weight:600}

/* ---------- reading view ---------- */
.reader{background:var(--paper);border:1px solid var(--hairline-2);border-radius:var(--r-lg);
  box-shadow:var(--shadow);padding:24px 22px 26px;margin-top:4px}
.sec-eyebrow{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 16px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:.75em;font-weight:600;
  padding:5.5px 11px;border-radius:999px;background:color-mix(in srgb,var(--hue,#888) 12%,transparent);
  color:color-mix(in srgb,var(--hue,#888) 46%,var(--text) 54%);letter-spacing:.01em;max-width:100%;min-height:30px}
.chip.plain{background:var(--field);color:var(--text-2)}
.sec-num{font-size:.95em;font-weight:700;color:color-mix(in srgb,var(--hue,var(--accent)) 56%,var(--text) 44%);letter-spacing:.02em;margin:2px 0 4px;font-variant-numeric:tabular-nums}
h2.sec-title{font-size:1.5em;line-height:1.22;font-weight:750;letter-spacing:-.018em;margin:0 0 18px}
.statute{font-family:var(--serif);font-size:calc(1.0625em*var(--fs-body,1));line-height:1.68;color:var(--text)}
.statute.sans{font-family:var(--ui);line-height:1.6}
.statute p{margin:0 0 .85em}
.statute .fl{margin-top:.2em}
.statute .it{display:flex;gap:.55em}
.statute .it .mk{flex:none;font-weight:600;color:var(--accent-deep);font-variant-numeric:tabular-nums;min-width:1.9em;text-align:right;font-family:var(--ui);font-size:.92em;padding-top:.12em}
.statute .it.l1{margin-left:0}
.statute .it.l2{margin-left:1.15em}
.statute .it.l3{margin-left:2.5em}
.statute .it .tx{flex:1;min-width:0}
.statute dfn{font-style:italic;font-weight:600;text-decoration:underline;
  text-decoration-color:color-mix(in srgb,var(--accent) 38%,transparent);
  text-decoration-thickness:2px;text-underline-offset:3px}
.statute .xref{font-weight:600;color:var(--accent-deep);border-bottom:1.5px solid color-mix(in srgb,var(--accent) 30%,transparent);cursor:pointer}
.statute .delnote{color:var(--text-3);font-size:.86em;font-family:var(--ui);margin:.9em 0}
.statute .verbatim{white-space:pre-wrap;font-family:var(--serif);margin:0;overflow-x:auto}
.callout{border-radius:var(--r-md);padding:13px 15px;margin:1em 0;border:1px solid var(--pen-line);background:var(--pen-bg)}
.callout p{margin:0 0 .5em}.callout p:last-child{margin:0}
.callout .co-head{font-size:.99em}
.callout .co-label{display:inline;font-family:var(--ui);font-weight:750;font-size:.82em;letter-spacing:.025em;text-transform:uppercase;color:var(--pen-text);margin-right:.35em}
.callout.sum{background:var(--sum-bg);border-color:var(--sum-line)}
.callout.sum .co-label{color:var(--sum-text)}
.callout .it{margin-top:.4em}
.altrow{display:block;border-top:1px solid var(--hairline-2);margin-top:1.1em;padding-top:.85em;
  font-family:var(--ui);font-size:.88em;color:var(--text-2)}
.altrow .alt-label{font-weight:700;font-size:.86em;letter-spacing:.03em;text-transform:uppercase;color:var(--text-3);margin-right:.3em}
.altrow .xref{border:0;font-weight:650}
.sec-foot{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:14px 2px 0;color:var(--text-3);font-size:.8em}
.sec-foot .dot{opacity:.5}
.pn-bar{display:flex;gap:10px;margin:16px 0 4px}
.pn{flex:1;display:flex;flex-direction:column;gap:1px;padding:11px 14px;border-radius:var(--r-md);
  background:var(--surface);border:1px solid var(--hairline-2);box-shadow:var(--shadow);min-height:56px;
  transition:transform .15s var(--ease);min-width:0}
.pn:active{transform:scale(.97)}
.pn.next{text-align:right;align-items:flex-end}
.pn .pn-dir{font-size:.72em;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3)}
.pn .pn-t{font-size:.86em;font-weight:600;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.refblock{margin:14px 0 0}
.refblock .cluster-h{margin-top:0}
.copyrow{display:flex;gap:8px;margin:14px 0 0;flex-wrap:wrap}
.copybtn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:12px;background:var(--surface);
  border:1px solid var(--hairline-2);box-shadow:var(--shadow);font-size:.85em;font-weight:600;color:var(--accent-deep);min-height:40px}
.copybtn svg{width:15px;height:15px}
.copybtn:active{transform:scale(.97);background:var(--accent-tint)}

/* ---------- search results ---------- */
.res-group-label{margin:18px 4px 7px;font-size:.78em;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3)}
.res-row .r-title b,.res-row .r-sub mark{background:var(--mark);border-radius:3px;padding:0 1px;color:inherit;font-weight:650}
.res-row .r-sub{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.go-row{background:var(--accent-tint)}
.go-row .r-title{color:var(--accent-deep);font-weight:650}
.empty{padding:44px 20px;text-align:center;color:var(--text-3)}
.empty p{margin:4px 0;font-size:.95em}
.empty svg{width:42px;height:42px;opacity:.35;margin-bottom:10px}
.search-note{margin:10px 4px;color:var(--text-3);font-size:.82em;display:flex;align-items:center;gap:8px}

/* ---------- dock ---------- */
#dock{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--sab) + 10px);z-index:50;
  display:flex;gap:2px;padding:5px;border-radius:999px;
  background:var(--dock-bg);-webkit-backdrop-filter:blur(24px) saturate(1.8);backdrop-filter:blur(24px) saturate(1.8);
  border:1px solid var(--hairline-2);box-shadow:var(--shadow-lg)}
.dock-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  width:72px;height:54px;border-radius:999px;color:var(--text-2);
  transition:color .18s,background .18s,transform .12s var(--ease)}
.dock-btn svg{width:22px;height:22px}
.dock-btn span{font-size:.62em;font-weight:650;letter-spacing:.01em}
.dock-btn.active{color:var(--accent-deep);background:var(--accent-tint)}
.dock-btn:active{transform:scale(.92)}

/* ---------- settings ---------- */
.set-group{margin:16px 0 0}
.set-group .card{border-radius:var(--r-md)}
.set-label{margin:0 4px 7px;font-size:.78em;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3)}
.set-row{display:flex;align-items:center;gap:12px;padding:12px 16px;min-height:52px}
.set-row + .set-row{border-top:1px solid var(--hairline-2)}
.set-row .s-title{flex:1;font-size:.97em;font-weight:500}
.seg{display:flex;background:var(--field);border-radius:11px;padding:2.5px;gap:2px}
.seg button{padding:6px 13px;border-radius:9px;font-size:.85em;font-weight:600;color:var(--text-2);transition:all .18s;min-height:32px}
.seg button.on{background:var(--solid);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.stepper{display:flex;align-items:center;gap:2px;background:var(--field);border-radius:11px;padding:2.5px}
.stepper button{width:40px;height:34px;border-radius:9px;font-size:1.1em;font-weight:600;color:var(--accent);text-align:center}
.stepper button:active{background:var(--solid)}
.stepper .val{min-width:46px;text-align:center;font-size:.85em;font-weight:650;color:var(--text-2);font-variant-numeric:tabular-nums}
input[type=checkbox].sw{appearance:none;-webkit-appearance:none;width:51px;height:31px;border-radius:999px;
  background:var(--field);position:relative;transition:background .2s;flex:none;margin:0;cursor:pointer}
input[type=checkbox].sw:checked{background:#34c759}
input[type=checkbox].sw::after{content:"";position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;
  background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .2s var(--ease)}
input[type=checkbox].sw:checked::after{transform:translateX(20px)}
.about-block{padding:14px 16px;color:var(--text-2);font-size:.88em;line-height:1.55}
.about-block b{color:var(--text)}
.install-steps{padding:4px 16px 14px;color:var(--text-2);font-size:.9em}
.install-steps ol{margin:6px 0 0;padding-left:20px}
.install-steps li{margin:7px 0;line-height:1.45}
.fresh-row{display:flex;align-items:baseline;gap:10px;padding:9px 16px;font-size:.85em}
.fresh-row + .fresh-row{border-top:1px solid var(--hairline-2)}
.fresh-row .fa{font-weight:650;flex:1}
.fresh-row .fc{color:var(--text-3);font-variant-numeric:tabular-nums}

/* ---------- saved ---------- */
.bm-star{color:var(--text-3)}
.bm-star.on{color:#f7b500}
.swipe-del{color:#b8364a;font-weight:600;font-size:.85em;padding:8px 10px;border-radius:10px;flex:none}

/* ---------- skeleton ---------- */
.skel{border-radius:var(--r-md);background:linear-gradient(100deg,var(--field) 40%,color-mix(in srgb,var(--field) 50%,transparent) 50%,var(--field) 60%);
  background-size:200% 100%;animation:shimmer 1.3s infinite linear}
@keyframes shimmer{to{background-position:-200% 0}}

/* ---------- iPad / desktop ---------- */

@media(min-width:820px){
  #app{max-width:1340px;margin:0 auto;gap:0;padding:0 20px}
  #sidebar{display:flex;flex-direction:column;width:312px;flex:none;
    height:100dvh;position:sticky;top:0;padding:18px 12px calc(18px + var(--sab));overflow-y:auto;
    border-right:1px solid var(--hairline-2)}
  #dock{display:none}
  .view{max-width:780px;padding:24px 40px 70px}
  .sb-brand{display:flex;align-items:center;gap:10px;padding:6px 8px 12px;width:100%;border-radius:12px}
  .sb-brand .mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#49A1F5,#215789);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.15em;font-family:var(--serif);flex:none}
  .sb-brand .t{font-weight:700;letter-spacing:-.01em;font-size:.98em}
  .sb-brand .s{display:block;font-size:.7em;color:var(--text-3);font-weight:550;letter-spacing:.04em;text-transform:uppercase}
  .sb-nav{display:flex;flex-direction:column;gap:1px;padding:2px 0 10px}
  .sb-nav button{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:11px;
    color:var(--text-2);font-size:.92em;font-weight:550;width:100%;min-height:40px}
  .sb-nav button svg{width:19px;height:19px;flex:none}
  .sb-nav button.active{color:var(--accent);background:var(--accent-tint);font-weight:650}
  .sb-nav button .kbd-hint{display:inline-flex;margin-left:auto}
  .sb-sec-label{padding:12px 10px 5px;font-size:.72em;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3)}
  .sb-tree{flex:1;min-height:0}
  .sb-item{display:flex;align-items:center;gap:9px;width:100%;padding:7.5px 10px;border-radius:10px;
    color:var(--text-2);font-size:.85em;font-weight:550;min-height:36px}
  .sb-item .dot{flex:none;width:8px;height:8px;border-radius:50%;background:var(--hue,var(--text-3))}
  .sb-item .lab{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sb-item .ct{flex:none;font-size:.82em;color:var(--text-3);font-variant-numeric:tabular-nums}
  .sb-item.on{background:var(--accent-tint);color:var(--accent);font-weight:650}
  .kbd-hint{display:inline-flex;gap:3px;color:var(--text-3);font-size:.72em;align-items:center}
  .kbd-hint kbd{background:var(--field);border-radius:5px;padding:2px 6px;font-family:var(--ui);font-size:.95em}
}
@media(min-width:820px){
  .brandbar{display:none}
  #view-home .home-hero{margin-top:26px}
}
@media(min-width:1180px){
  .view{max-width:840px}
}
@media all and (display-mode:standalone){
  .lg-head{padding-top:12px}
}
.hide{display:none!important}
#haptic-proxy{position:fixed;left:-100px;top:-100px;width:1px;height:1px;opacity:0;pointer-events:none}
#overlay{display:none}

/* hover */
@media(hover:hover){
  .row:hover{background:var(--accent-tint)}
  .pn:hover{border-color:color-mix(in srgb,var(--accent) 35%,transparent)}
  .dock-btn:hover,.icon-btn:hover{background:var(--accent-tint);color:var(--accent)}
  .chip:hover{filter:brightness(1.06)}
  .tile:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .tchip:hover{background:var(--accent-tint)}
  .part-head:hover{background:var(--accent-tint)}
  .seg button:hover{color:var(--text)}
  .statute .xref:hover{border-bottom-color:var(--accent)}
  .sb-nav button:hover,.sb-item:hover{background:var(--accent-tint)}
  .scope:hover:not(.on){color:var(--text)}
  .copybtn:hover{background:var(--accent-tint)}
  .sec-label .more-link:hover{background:var(--accent-tint)}
  .back-btn:hover{background:var(--accent-tint)}
}
.field input[type=search]{-webkit-appearance:none;appearance:none}
.field input[type=search]::-webkit-search-cancel-button{display:none}

@media(prefers-color-scheme:dark){
  :root:not([data-theme]) .scope.on{color:#0c1020}
  :root:not([data-theme]) .swipe-del{color:#f08f9e}
}
[data-theme=dark] .swipe-del{color:#f08f9e}
.pn .pn-t{color:var(--accent-deep)}
.sb-nav button.active{color:var(--accent-deep)}
.sb-item.on{color:var(--accent-deep)}

/* ============ v4: soft monochrome ramps ============ */
.tiles{gap:10px}
.tile-g{position:relative;display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;gap:12px;
  min-height:96px;border-radius:18px;padding:14px;color:var(--text);border:1px solid color-mix(in srgb,var(--f400) 26%,transparent);
  background:linear-gradient(135deg, color-mix(in srgb,var(--f100) 52%,var(--solid)), color-mix(in srgb,var(--f200) 38%,var(--solid)));
  box-shadow:0 6px 16px -10px color-mix(in srgb,var(--f600) 26%,transparent),0 1px 2px rgba(22,24,29,.04);
  transition:transform .16s var(--ease),box-shadow .2s,border-color .2s}
.tile-g .tg-ic{display:flex;width:34px;height:34px;border-radius:10px;align-items:center;justify-content:center;flex:none;
  background:color-mix(in srgb,var(--f500) 14%,transparent);color:color-mix(in srgb,var(--f700) 85%,var(--text) 15%)}
.tile-g .tg-ic svg{width:19px;height:19px}
.tile-g .tg-t{font-weight:650;font-size:.94em;letter-spacing:-.01em;line-height:1.22;text-wrap:balance;
  color:color-mix(in srgb,var(--f900) 55%,var(--text) 45%)}
.tile-g:active{transform:scale(.97)}
.tile-g.wide{grid-column:1/-1;flex-direction:row;align-items:center;justify-content:flex-start;gap:14px;min-height:84px}
@media(min-width:700px){ .tile-g.wide{grid-column:span 2} }
.tile-g.wide .tg-ic{width:42px;height:42px;border-radius:12px}
.tile-g.wide .tg-ic svg{width:22px;height:22px}
.tile-g.wide .tg-tx{display:flex;flex-direction:column;gap:3px;min-width:0}
.tile-g.wide .tg-t{font-size:1.02em}
.tile-g .tg-d{display:none}
.tile-g.wide .tg-d{display:block;font-size:.8em;font-weight:450;color:var(--text-2);line-height:1.35}
[data-theme=dark] .tile-g{
  background:linear-gradient(135deg, color-mix(in srgb,var(--f900) 36%,var(--solid)), color-mix(in srgb,var(--f700) 16%,var(--solid)));
  border-color:color-mix(in srgb,var(--f500) 22%,transparent);
  box-shadow:0 8px 18px -12px color-mix(in srgb,var(--f700) 50%,transparent),0 1px 2px rgba(0,0,0,.3)}
[data-theme=dark] .tile-g .tg-ic{background:color-mix(in srgb,var(--f500) 22%,transparent);color:var(--f300)}
[data-theme=dark] .tile-g .tg-t{color:color-mix(in srgb,var(--f100) 70%,var(--text) 30%)}
@media(prefers-color-scheme:dark){
  :root:not([data-theme]) .tile-g{
    background:linear-gradient(135deg, color-mix(in srgb,var(--f900) 36%,var(--solid)), color-mix(in srgb,var(--f700) 16%,var(--solid)));
    border-color:color-mix(in srgb,var(--f500) 22%,transparent);
    box-shadow:0 8px 18px -12px color-mix(in srgb,var(--f700) 50%,transparent),0 1px 2px rgba(0,0,0,.3)}
  :root:not([data-theme]) .tile-g .tg-ic{background:color-mix(in srgb,var(--f500) 22%,transparent);color:var(--f300)}
  :root:not([data-theme]) .tile-g .tg-t{color:color-mix(in srgb,var(--f100) 70%,var(--text) 30%)}
}
@media(hover:hover){
  .tile-g:hover{transform:translateY(-1.5px);border-color:color-mix(in srgb,var(--f500) 45%,transparent);
    box-shadow:0 12px 24px -12px color-mix(in srgb,var(--f600) 38%,transparent),0 2px 5px rgba(22,24,29,.05)}
}
@media(prefers-reduced-motion:reduce){ .tile-g:hover{transform:none} }

/* thin clean section-number pills */
.pillnum{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  min-width:74px;padding:4px 9px;border-radius:9px;flex:none;
  border:1px solid color-mix(in srgb,var(--hue) 28%,transparent);
  background:color-mix(in srgb,var(--hue) 6%,transparent)}
.pillnum i{font-style:normal;font-size:.58em;font-weight:700;letter-spacing:.09em;color:var(--text-3);text-transform:uppercase;line-height:1.3}
.pillnum b{font-size:.84em;font-weight:700;color:color-mix(in srgb,var(--hue) 58%,var(--text) 42%);
  font-variant-numeric:tabular-nums;white-space:nowrap;line-height:1.25}
.trow{padding:11px 16px;min-height:56px}
.trow + .trow::before{left:103px}
.trow .r-title{font-weight:550;font-size:.95em}

/* topic page hero */
.t-hero{display:flex;align-items:center;gap:14px;margin:16px 0 2px}
.t-hero .th-ic{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex:none;
  background:linear-gradient(135deg, color-mix(in srgb,var(--f100) 60%,var(--solid)), color-mix(in srgb,var(--f200) 45%,var(--solid)));
  border:1px solid color-mix(in srgb,var(--f400) 30%,transparent);
  color:color-mix(in srgb,var(--f700) 85%,var(--text) 15%);
  box-shadow:0 8px 18px -10px color-mix(in srgb,var(--f600) 30%,transparent)}
[data-theme=dark] .t-hero .th-ic{background:linear-gradient(135deg, color-mix(in srgb,var(--f900) 40%,var(--solid)), color-mix(in srgb,var(--f700) 18%,var(--solid)));border-color:color-mix(in srgb,var(--f500) 24%,transparent);color:var(--f300)}
@media(prefers-color-scheme:dark){
  :root:not([data-theme]) .t-hero .th-ic{background:linear-gradient(135deg, color-mix(in srgb,var(--f900) 40%,var(--solid)), color-mix(in srgb,var(--f700) 18%,var(--solid)));border-color:color-mix(in srgb,var(--f500) 24%,transparent);color:var(--f300)}
}
.t-hero .th-ic svg{width:26px;height:26px}
.t-hero .th-tx{min-width:0}
.t-hero .eyebrow{display:block;font-size:.78em;font-weight:650;color:var(--text-3);letter-spacing:.03em;text-transform:uppercase;margin:0 0 1px}
.t-hero h1{font-size:1.7em;font-weight:800;letter-spacing:-.02em;margin:0;line-height:1.12}
.t-blurb{margin:8px 2px 6px;color:var(--text-2);font-size:.95em}
.cl-card{margin:14px 0}
.cl-head{display:flex;align-items:center;gap:8px;margin:0;padding:13px 16px 10px;font-size:.78em;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;color:var(--text-2);border-bottom:1px solid var(--hairline-2)}
.cl-head::before{content:"";width:8px;height:8px;border-radius:3px;background:var(--gd,var(--accent));flex:none;opacity:.75}

/* per-act page tint */
.view.tinted{background:radial-gradient(760px 300px at 50% -130px, color-mix(in srgb,var(--f300) 15%,transparent), transparent 72%)}
[data-theme=dark] .view.tinted{background:radial-gradient(760px 300px at 50% -130px, color-mix(in srgb,var(--f700) 14%,transparent), transparent 72%)}
@media(prefers-color-scheme:dark){
  :root:not([data-theme]) .view.tinted{background:radial-gradient(760px 300px at 50% -130px, color-mix(in srgb,var(--f700) 14%,transparent), transparent 72%)}
}

/* reader action row */
.actrow{display:flex;gap:8px;margin:0 0 16px;flex-wrap:wrap}
.act-chip{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:11px;background:var(--field);
  font-size:.84em;font-weight:600;color:var(--accent-deep);min-height:38px;transition:background .15s,transform .12s var(--ease)}
.act-chip svg{width:15px;height:15px}
.act-chip:active{transform:scale(.96)}
.act-chip.done{color:#0c7a43;background:rgba(52,199,89,.13)}
[data-theme=dark] .act-chip.done{color:#5dd789}
@media(hover:hover){ .act-chip:hover{background:var(--accent-tint)} }

/* dock with 5 tabs */
.dock-btn{width:64px}
@media(max-width:359px){ .dock-btn{width:56px} .dock-btn span{font-size:.58em} }

/* ============ v4.1: Mobbin-grounded refinements ============ */
/* recent/suggested search chips */
.qh-label{display:flex;align-items:center}
.qh-clear{margin-left:auto;color:var(--accent-deep);font-weight:600;font-size:1.04em;text-transform:none;letter-spacing:0;padding:2px 6px;border-radius:7px}
.qchips{display:flex;flex-wrap:wrap;gap:7px;margin:2px 2px 6px}
.qchip{display:inline-flex;align-items:center;gap:6px;padding:7.5px 12px;border-radius:999px;
  background:var(--surface);border:1px solid var(--hairline-2);box-shadow:var(--shadow);
  font-size:.86em;font-weight:550;min-height:36px;transition:background .15s,transform .12s var(--ease)}
.qchip:active{transform:scale(.96)}
.qchip.sug{background:var(--field);box-shadow:none;color:var(--text-2)}
.qchip .qx{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;
  color:var(--text-3);margin-right:-4px}
.qchip .qx svg{width:12px;height:12px}
@media(hover:hover){
  .qchip:hover{background:var(--accent-tint)}
  .qchip .qx:hover{background:var(--field);color:var(--text)}
  .qh-clear:hover{background:var(--accent-tint)}
}

/* reader Aa popover */
.aa-wrap{position:relative}
.aa-pop{display:none;position:absolute;top:-6px;right:0;z-index:40;width:min(300px,86vw);
  background:var(--solid);border:1px solid var(--hairline);border-radius:16px;box-shadow:var(--shadow-lg);
  padding:8px 14px}
.aa-pop.open{display:block;animation:viewin .18s var(--ease)}
.aa-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;min-height:46px}
.aa-row + .aa-row{border-top:1px solid var(--hairline-2)}
.aa-lab{font-size:.88em;font-weight:600;color:var(--text-2)}

/* ============ v5: drug matrix, group topics, worked examples, quiz ============ */
.dmx-card{margin:14px 0;overflow:hidden}
.dmx-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.dmx{border-collapse:collapse;width:100%;min-width:430px;font-size:.86em}
.dmx th,.dmx td{padding:9px 12px;text-align:left;border-top:1px solid var(--hairline-2)}
.dmx thead th{border-top:0;padding-top:12px;vertical-align:bottom}
.dmx .dmx-sch{display:block;font-weight:700;font-size:.82em;letter-spacing:.04em;text-transform:uppercase;color:var(--text-2)}
.dmx .dmx-desc{display:block;font-weight:500;font-size:.72em;color:var(--text-3);max-width:120px;line-height:1.25;margin-top:2px}
.dmx th.dmx-name{font-weight:650;font-size:.95em;white-space:nowrap}
.dmx tbody th.dmx-name{color:var(--text)}
.dmx-amt{font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent-deep);
  padding:5px 10px;border-radius:8px;background:var(--accent-tint);min-height:32px;white-space:nowrap}
.dmx-amt:active{transform:scale(.95)}
.dmx-na{color:var(--text-3)}
.dmx-foot{padding:11px 16px 13px;margin:0;color:var(--text-3);font-size:.8em;line-height:1.5;border-top:1px solid var(--hairline-2)}
@media(hover:hover){ .dmx-amt:hover{background:color-mix(in srgb,var(--accent) 18%,transparent)} }

/* group topic chips in act browse */
.grp-topics{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px 39px}
.gt-chip{display:inline-flex;align-items:center;gap:5px;padding:4.5px 10px;border-radius:999px;
  font-size:.72em;font-weight:600;color:var(--text-2);background:var(--field);min-height:28px;
  transition:background .15s}
.gt-chip svg{width:12px;height:12px;color:var(--text-3)}
@media(hover:hover){ .gt-chip:hover{background:var(--accent-tint);color:var(--accent-deep)} }

/* worked example card */
.scen-card{margin:14px 0}
.scen-head{display:flex;align-items:center;gap:10px;width:100%;padding:13px 16px;font-weight:650;font-size:.92em}
.scen-head svg{width:18px;height:18px;color:var(--accent-deep);flex:none}
.scen-head .sc-t{flex:1;min-width:0}
.scen-card.open .part-chev{transform:rotate(90deg)}
.scen-body{padding:2px 16px 14px}
.scen-fact{margin:0 0 10px;font-size:.93em;line-height:1.55;color:var(--text)}
.scen-el{display:flex;gap:9px;padding:7px 0;border-top:1px solid var(--hairline-2);font-size:.88em}
.scen-el .mk2{flex:none;font-weight:700;color:var(--accent-deep);font-variant-numeric:tabular-nums;min-width:30px}
.scen-el .tx2{color:var(--text-2);font-family:var(--serif)}
.scen-pen{margin:9px 0 0;padding:8px 12px;border-radius:10px;background:var(--pen-bg);border:1px solid var(--pen-line);
  color:var(--pen-text);font-size:.84em;font-weight:600}
.scen-note{margin:10px 0 0;color:var(--text-3);font-size:.76em;line-height:1.45}

/* quiz */
.quiz-ov{position:fixed;inset:0;z-index:120;background:rgba(12,14,20,.45);
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;animation:viewin .2s var(--ease)}
.quiz-sheet{width:min(560px,100%);max-height:84dvh;overflow-y:auto;background:var(--solid);
  border-radius:22px 22px 0 0;box-shadow:var(--shadow-lg);padding:14px 18px calc(18px + var(--sab))}
@media(min-width:700px){
  .quiz-ov{align-items:center}
  .quiz-sheet{border-radius:22px;padding-bottom:18px}
}
.quiz-top{display:flex;align-items:center;gap:10px}
.qz-title{flex:1;font-weight:700;font-size:.95em}
.qz-streak{font-size:.78em;font-weight:700;color:#0c7a43;background:rgba(52,199,89,.13);padding:3px 9px;border-radius:999px}
[data-theme=dark] .qz-streak{color:#5dd789}
.qz-q{margin:14px 2px 12px;font-size:1.02em;font-weight:600;line-height:1.4}
.qz-opts{display:flex;flex-direction:column;gap:8px}
.qz-opt{padding:12px 14px;border-radius:13px;border:1px solid var(--hairline);background:var(--surface-2);
  font-size:.92em;line-height:1.4;min-height:46px;transition:background .15s,border-color .15s}
.qz-opt.right{border-color:#34c759;background:rgba(52,199,89,.13)}
.qz-opt.wrong{border-color:#e1504d;background:rgba(225,80,77,.12)}
@media(hover:hover){ .qz-opt:not(.right):not(.wrong):hover{background:var(--accent-tint);border-color:color-mix(in srgb,var(--accent) 40%,transparent)} }
.qz-fb{margin:12px 2px 0;font-size:.88em;line-height:1.45;color:var(--text-2)}
.qz-fb.ok b{color:#0c7a43}
.qz-fb.no b{color:#b8364a}
[data-theme=dark] .qz-fb.ok b{color:#5dd789}
[data-theme=dark] .qz-fb.no b{color:#f08f9e}
.qz-next{margin:14px 0 2px;width:100%;text-align:center;padding:12px;border-radius:13px;
  background:var(--accent);color:#fff;font-weight:650;font-size:.95em}
[data-theme=dark] .qz-next{color:#0c1020}
.qz-next:active{transform:scale(.98)}

/* ============ v6: scaffolds, doctrine, ticker, selection pill ============ */
/* recall scaffold card (System B) */
.scaff-card{margin:18px 0 16px;background:var(--surface);border:1px solid color-mix(in srgb,var(--hue,#888) 30%,transparent);
  border-radius:var(--r-md);box-shadow:var(--shadow);overflow:hidden}
.scaff-head{display:flex;align-items:center;gap:10px;width:100%;padding:12px 15px;font-weight:650;font-size:.92em}
.scaff-head svg{width:18px;height:18px;color:color-mix(in srgb,var(--hue,#888) 70%,var(--text) 30%);flex:none}
.scaff-head .sf-t{flex:1;min-width:0}
.scaff-head .sf-n{font-size:.76em;font-weight:700;color:color-mix(in srgb,var(--hue,#888) 60%,var(--text) 40%);
  background:color-mix(in srgb,var(--hue,#888) 9%,transparent);border:1px solid color-mix(in srgb,var(--hue,#888) 26%,transparent);
  padding:3px 9px;border-radius:999px;white-space:nowrap}
.scaff-card.open .part-chev{transform:rotate(90deg)}
.scaff-card .part-chev{transition:transform .25s var(--ease)}
.sf-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s var(--ease)}
.scaff-card.open .sf-body{grid-template-rows:1fr}
.sf-body>div{overflow:hidden}
.scaff-card{border-top:3px solid color-mix(in srgb,var(--hue,#888) 55%,transparent)}
.scaff-body{padding:2px 15px 13px;transition:padding .3s var(--ease)}
.scaff-card:not(.open) .scaff-body{padding-top:0;padding-bottom:0}
.sf-ent + .sf-ent{border-top:1px solid var(--hairline-2);margin-top:11px;padding-top:11px}
.sf-row{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.sf-ref{font-size:.72em;font-weight:700;letter-spacing:.04em;color:var(--text-3);font-variant-numeric:tabular-nums;flex:none}
.sf-title{font-weight:700;font-size:.96em;flex:1;min-width:0}
.sf-count{font-size:.74em;font-weight:700;color:color-mix(in srgb,var(--hue,#888) 60%,var(--text) 40%);white-space:nowrap}
.sf-limbs{margin:8px 0 0;padding-left:22px}
.sf-limbs li{font-family:var(--serif);font-size:.93em;line-height:1.5;margin:5px 0;color:var(--text)}
.sf-limbs li::marker{font-family:var(--ui);font-weight:700;color:color-mix(in srgb,var(--hue,#888) 60%,var(--text) 40%)}
.sf-note{margin:7px 0 0;font-size:.8em;color:var(--text-2);font-style:italic}
.sf-hook{margin:9px 0 0;padding:7px 11px;border:1.5px dashed color-mix(in srgb,var(--hue,#888) 32%,transparent);
  border-radius:10px;font-size:.78em;font-weight:600;color:var(--text-3)}

/* doctrine paragraphs */
.statute .dl{margin:0 0 .7em}
.statute .dl.li{margin:0 0 .35em 1.1em}
.statute .dl.ind{margin-left:1.1em}

/* ticker strip */
.ticker{display:flex;gap:6px;overflow-x:auto;padding:0 16px 11px 39px;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 14px,#000 calc(100% - 22px),transparent);
  mask-image:linear-gradient(90deg,transparent,#000 14px,#000 calc(100% - 22px),transparent)}
.ticker::-webkit-scrollbar{display:none}
.tk{flex:none;font-size:.74em;font-weight:550;color:var(--text-2);padding:4px 10px;min-height:27px;
  border-radius:999px;border:1px solid var(--hairline-2);background:var(--surface-2);white-space:nowrap;
  transition:background .15s,color .15s}
@media(hover:hover){ .tk:hover{background:var(--accent-tint);color:var(--accent-deep)} }

/* selection copy pill */
.sel-pill{position:fixed;z-index:140;display:inline-flex;align-items:center;gap:7px;padding:9px 14px;
  border-radius:999px;background:var(--text);color:var(--bg);font-size:.84em;font-weight:650;
  box-shadow:var(--shadow-lg);animation:viewin .15s var(--ease)}
.sel-pill svg{width:14px;height:14px}
.sel-pill:active{transform:scale(.96)}

.statute .dl.hd { font-weight: 680; letter-spacing: .01em; margin-top: 14px; }


/* ============ v8: wide-screen rails ============ */
@media (min-width:1240px){
  /* recall scaffold as sticky side rail beside the statute */
  .reader{display:grid;grid-template-columns:minmax(0,1fr) 304px;column-gap:28px}
  .reader>*{grid-column:1}
  .reader>.scaff-card{grid-column:2;grid-row:1/span 99;align-self:start;position:sticky;top:74px;
    margin:0;max-height:calc(100vh - 100px);overflow:auto;scrollbar-width:thin}
  .reader>.scaff-card .part-chev{display:none}
  .reader>.scaff-card .sf-body{grid-template-rows:1fr}
  .reader>.scaff-card .scaff-head{pointer-events:none}
  /* browse: scrollspy rail replaces the tickers */
  #view-act{display:grid;grid-template-columns:minmax(0,1fr) 286px;column-gap:28px;align-items:start}
  #view-act>*{grid-column:1}
  #view-act>.spy{grid-column:2;grid-row:1/span 199;align-self:start;position:sticky;top:74px;
    max-height:calc(100vh - 100px);overflow:auto;scrollbar-width:none;display:flex;flex-direction:column;gap:2px;
    padding:10px 4px 14px}
  #view-act .ticker{display:none}
}
@media (max-width:1239.9px){ .spy{display:none} }

/* scrollspy rail */
.spy-head{font-size:.72em;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);
  margin:0 0 8px;padding:0 10px}
.spy-g{display:flex;gap:10px;align-items:stretch;text-align:left;padding:7px 10px;border-radius:12px;
  transition:background .15s;width:100%}
.spy-g .spy-bar{flex:none;width:3px;border-radius:99px;background:color-mix(in srgb,var(--hue,#888) 30%,transparent);
  transition:background .2s}
.spy-g .spy-main{min-width:0;display:flex;flex-direction:column;gap:2px}
.spy-g .spy-lab{font-size:.8em;font-weight:650;color:var(--text-2);line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.spy-g .spy-names{font-size:.7em;line-height:1.45;color:var(--text-3);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.spy-g.on{background:color-mix(in srgb,var(--hue,#888) 8%,transparent)}
.spy-g.on .spy-bar{background:color-mix(in srgb,var(--hue,#888) 75%,var(--text) 10%)}
.spy-g.on .spy-lab{color:var(--text);font-weight:700}
@media(hover:hover){ .spy-g:hover{background:color-mix(in srgb,var(--hue,#888) 6%,transparent)} }
[data-theme="dark"] .spy-g.on{background:color-mix(in srgb,var(--hue,#888) 16%,transparent)}

</style>

WEBB punches WALKER once in a sudden argument. WALKER falls, hits his head on the kerb and later dies. If the killing is unlawful but the elements of murder under s 279 are not made out, WEBB commits manslaughter.", "els": []}, "cc:cc-281": {"h": "King-hit outside the club", "fact": "NASH strikes DEAN with a single unprovoked punch to the head outside a nightclub; DEAN dies. Even if death was not foreseeable, the assault caused the death — unlawful assault causing death.", "els": [{"m": "(1)", "t": "If a person unlawfully assaults another who dies as a direct or indirect result of the assault, the person is guilty of a crime and is liable to imprisonment for 20 years."}]}, "cc:cc-300": {"h": "Three incidents in six months", "fact": "Over six months, KANE assaults his partner in February, threatens to kill her in April (s 338B), and damages her car door in June (s 444) — each an act of family violence against the same person. Three or more such acts over the period can constitute persistent family violence.", "els": [{"m": "(1)", "t": "A person commits a crime if the person persistently engages in family violence."}, {"m": "(2)", "t": "A charge of an offence under subsection (1) —"}], "pen": "Penalty for this subsection: imprisonment for 14 years."}, "cc:cc-338B": {"h": "Text threat", "fact": "FLYNN sends his ex-housemate a message: 'I will kill you when I find you.' A threat to kill made by any means — the offence is complete on the making of the threat, aggravating circumstances aside.", "els": [{"m": "(a)", "t": "where the threat is to kill a person —"}, {"m": "(b)", "t": "in the case of any other threat —"}], "pen": "Summary conviction penalty: "}, "cc:cc-338E": {"h": "Following and messaging", "fact": "Over three weeks SHARP repeatedly waits outside PRICE's gym, follows her bus home and sends dozens of unwanted messages, intending to intimidate her. The repeated pursuit-type conduct with that intent is stalking.", "els": [{"m": "(1)", "t": "A person who pursues another person with intent to intimidate that person or a third person, is guilty of a crime and is liable —"}], "pen": "Summary conviction penalty: "}, "cc:cc-332": {"h": "Ransom demand", "fact": "Two men force COLE into a van, drive him to a unit and message his family demanding $50,000 for his release. Detaining him with intent to gain a benefit — the demand — is kidnapping.", "els": [{"m": "(1)", "t": "For the purposes of this section and section 333, a person who deprives another person of personal liberty —"}]}, "cc:cc-333": {"h": "Locked in the office", "fact": "A security guard locks a suspected shoplifter in a back office for an hour with no lawful authority and against her will. Depriving another of personal liberty — deprivation of liberty.", "els": [], "pen": "Penalty: "}, "cc:cc-371": {"h": "The borrowed mower", "fact": "OWEN borrows his neighbour's mower for the weekend, then sells it at a swap meet and keeps the cash. Taking was innocent; the later fraudulent conversion to his own use with intent to permanently deprive engages the definition of stealing.", "els": [{"m": "(1)", "t": "A person who fraudulently takes anything capable of being stolen, or fraudulently converts to his own use or to the use of any other person any property, is said to steal that thing or that property."}, {"m": "(2)", "t": "A person who takes anything capable of being stolen or converts any property is deemed to do so fraudulently if he does so with any of the following intents, that is to say —"}]}, "cc:cc-378": {"h": "Shop till theft", "fact": "A casual worker takes $180 from the till over two shifts and spends it. The thing stolen is the employer's money — stealing, with the penalty (and aggravated forms) set by this section.", "els": []}, "cc:cc-371A": {"h": "Weekend joyride", "fact": "TATE takes a stranger's parked car without consent, drives it all weekend and dumps it. Even without intent to permanently deprive, unlawfully using the motor vehicle is treated as stealing under this section.", "els": []}, "cc:cc-392": {"h": "Servo hold-up", "fact": "Wearing a balaclava, REES presents a screwdriver at a service-station console operator and yells at her to empty the till. He takes $400 and runs. Stealing with a threat of violence immediately before the taking, in order to obtain the cash — robbery; the screwdriver engages the armed limb.", "els": [{"m": "(a)", "t": "to obtain the thing stolen; or"}, {"m": "(b)", "t": "to prevent or overcome resistance to its being stolen,"}, {"m": "(c)", "t": "if immediately before or at or immediately after the commission of the offence the offender is armed with any dangerous or offensive weapon or instrument or pretends to be so armed, to imprisonment for life; or"}]}, "cc:cc-401": {"h": "Window entry", "fact": "At 2 am, DRAKE climbs through an unlatched laundry window of a house intending to steal. Entering the place of another without consent with intent to commit an offence — burglary; a dwelling at night raises the aggravated form.", "els": [{"m": "(1)", "t": "A person who enters or is in the place of another person, without that other person’s consent, with intent to commit an offence in that place is guilty of a crime and is liable —"}, {"m": "(2)", "t": "A person who commits an offence in the place of another person, when in that place without that other person’s consent, is guilty of a crime and is liable —"}]}, "cc:cc-409": {"h": "The fake invoice", "fact": "BLISS emails a business a bogus 'overdue' invoice with her own account details. The business pays $2,300. Obtaining a benefit by deceit with intent to defraud — fraud.", "els": [{"m": "(1)", "t": "Any person who, with intent to defraud, by deceit or any fraudulent means —"}], "pen": "Summary conviction penalty (subject to subsection (2)): "}, "cc:cc-414": {"h": "Fell off a truck", "fact": "MOSS buys a new 85-inch TV for $150 cash from a stranger in a car park, boxed with security tags still attached. The circumstances support knowledge or belief that it was stolen when he received it — receiving.", "els": []}, "cc:cc-444": {"h": "Keyed panels", "fact": "After a road-rage exchange, VOSS drags a key along both panels of QUINN's ute, causing $4,000 damage. Wilfully and unlawfully damaging the property of another — criminal damage.", "els": [{"m": "(1)", "t": "Any person who wilfully and unlawfully destroys or damages any property is guilty of a crime and is liable —"}]}, "cc:cc-248": {"h": "Bottle raised", "fact": "CAINE raises a bottle and steps at HUNT, who punches CAINE once and steps back. If HUNT believed the act was necessary to defend himself and the act was a reasonable response in the circumstances as he believed them, the harmful act is lawful self-defence.", "els": [{"m": "(4)", "t": "A person’s harmful act is done in self-defence if —"}]}, "cc:cc-23B": {"h": "The deflected dart", "fact": "At a crowded pub, a thrown dart ricochets off a beam and strikes a bystander. If the injury occurs by accident — an event not intended or foreseen and not reasonably foreseeable — criminal responsibility for it is excluded.", "els": [{"m": "(1)", "t": "This section is subject to the provisions in Chapter XXVII and section 444A relating to negligent acts and omissions."}, {"m": "(2)", "t": "A person is not criminally responsible for an event which occurs by accident."}]}, "cc:cc-24": {"h": "The wrong suitcase", "fact": "At the airport carousel, LOWE takes a black suitcase honestly and reasonably believing it is his identical bag. The mistaken belief in that state of things means his responsibility is assessed as if the bag were his.", "els": []}, "cc:cc-244": {"h": "3 am intruder", "fact": "A householder wakes to an intruder forcing the back door. Believing the intruder intends to commit an offence, the occupant uses force to prevent entry and detain him. This section sets out when that force is lawful — including that it must not be intended or likely to cause death unless the occupant fears violence.", "els": [{"m": "(1)", "t": "It is lawful for a person (the occupant) who is in peaceable possession of a dwelling to use any force or do anything else that the occupant believes, on reasonable grounds, to be necessary —"}, {"m": "(2)", "t": "A person is a home invader for the purposes of subsection (1) if the occupant believes, on reasonable grounds, that the person —"}]}, "cc:cc-70A": {"h": "Refusing to leave", "fact": "Asked three times by the owner to leave a bottle shop after abusing staff, GIBB stays put. Remaining on premises after being warned off by the occupier — trespass.", "els": [{"m": "(1)", "t": "In this section — abattoir has the meaning given in the Animal Welfare Act 2002 section 36A;"}], "pen": "Penalty for this subsection: imprisonment for 12 months and a fine of $12 000."}, "cc:cc-74A": {"h": "Taxi-rank tirade", "fact": "At a busy rank, INGRAM screams sustained abuse and challenges strangers to fight. Behaving in a disorderly manner in a public place — disorderly behaviour.", "els": [{"m": "(1)", "t": "In this section — behave in a disorderly manner includes —"}]}, "cia:s-128": {"h": "Arresting the burglar", "fact": "An officer finds PRYOR at 3 am in a commercial yard, gloves on, holding bolt cutters beside a cut padlock. The officer reasonably suspects PRYOR has committed burglary — an arrestable offence — and arrests him without a warrant under this power.", "els": [{"m": "(1)", "t": "In this section — serious offence means an offence —"}, {"m": "(2)", "t": "A police officer or a public officer may arrest a person for a serious offence if the officer reasonably suspects that the person has committed, is committing, or is just about to commit, the offence."}]}, "cia:s-39": {"h": "Stolen tools in the tray", "fact": "A patrol stops a ute matching a burglary lookout; in plain view are drills matching the stolen property list. This section's power to search a vehicle for things relevant to an offence applies.", "els": [{"m": "(1)", "t": "If an officer reasonably suspects —"}]}, "cia:s-41": {"h": "Getting the warrant", "fact": "Investigating a drug supply operation, detectives prepare an application identifying the target unit and the things sought. This section governs applying for the search warrant; the issue and effect follow in ss 42–43.", "els": [{"m": "(1)", "t": "Only a police officer or a public officer may apply for a search warrant."}]}, "cia:s-63": {"h": "Pat-down at the van", "fact": "Before placing an arrested person in the van, an officer runs hands over his outer clothing and empties his pockets. That is a basic search as defined — contrast the strip search definition in s 64.", "els": []}, "cia:s-118": {"h": "The unrecorded confession", "fact": "In a murder investigation, a suspect allegedly confesses in the car on the way to the station, but the admission is not audiovisually recorded and no recording exception applies. This section makes such an admission inadmissible in a serious-offence case.", "els": [{"m": "(1)", "t": "In this section — admission means an admission made by a suspect to a police officer or a CCC officer, whether the admission is by spoken words or by acts or otherwise; adult means a person who has reached 18 years of age; child means a person who is under 18 years of age; reasonable excuse, for the absence of an audiovisual recording of an admission, includes —"}, {"m": "(2)", "t": "This section applies in respect of a suspect who is —"}]}, "cia:s-140": {"h": "The six-hour clock", "fact": "MARTIN is arrested at 14:00 for aggravated burglary. From arrest, the detention period this section fixes governs how long he can be detained for investigation before a senior officer must extend or he must be charged, released or brought before a court.", "els": [{"m": "(1)", "t": "In this section — arrested suspect has the meaning given to that term by section 139; senior officer means —"}, {"m": "(2)", "t": "For the purposes of this section, the detention of an arrested suspect is justified if the detention —"}]}, "mda:s-6": {"h": "Baggies, scales, cash", "fact": "A search of HALE's flat finds 12 gram baggies of methylamphetamine, digital scales, $2,150 in small notes and a tick list. Possession of the prohibited drug with intent to sell or supply — the indicia evidence the intent.", "els": [{"m": "(1)", "t": "A person commits a crime if the person —"}]}, "mda:s-11": {"h": "Over the presumption weight", "fact": "POOLE is found with 3.4 g of methylamphetamine — above the 2.0 g Schedule V quantity. This section presumes an intent to sell or supply, which POOLE bears the burden of rebutting.", "els": []}, "mda:s-32a": {"h": "Declared trafficker weight", "fact": "KERR is convicted of possessing 31 g of methylamphetamine with intent to sell or supply — over the 28.0 g Schedule VII quantity. On application, the court must declare him a drug trafficker, with the confiscation consequences that follow.", "els": [{"m": "(1)", "t": "If a person is convicted of —"}]}, "roa:s-61": {"h": "Contact despite the order", "fact": "An FVRO restrains DALE from contacting the person protected. Within a fortnight he messages her twice and attends her workplace. Each act breaches the restraining order.", "els": [{"m": "(1)", "t": "A person who is bound by an FVRO and who breaches that order commits an offence."}, {"m": "(2)", "t": "A person who is bound by an MRO and who breaches that order commits an offence."}], "pen": "Penalty for this subsection: a fine of $10 000 or imprisonment for 2 years, or both."}, "wa:s-6": {"h": "Knuckle dusters in the console", "fact": "During a vehicle search, officers find knuckle dusters in the centre console. Knuckle dusters are a prohibited weapon prescribed by the regulations — carrying or possessing them, absent an exception, is an offence.", "els": [{"m": "(1)", "t": "Except as provided in subsections (2) and (3) and section 10, a"}], "pen": "Penalty: imprisonment for 3 years and a fine of $36 000."}}, "scaff": {"cc:ca-1": [{"r": "s 1", "t": "Bodily harm", "n": "1", "cw": "def", "limbs": ["any bodily injury which interferes with health or comfort."], "notes": ["(Scatchard: pain alone is NOT bodily harm.)"]}, {"r": "s 1", "t": "Grievous bodily harm", "n": "1", "cw": "def", "limbs": ["any bodily injury of such a nature as to endanger, or be likely to endanger life, or to cause, or be likely to cause, permanent injury to health."], "notes": []}, {"r": "s 1", "t": "Possession", "n": "1", "cw": "def", "limbs": ["includes having under control in any manner whatever … although another person has the actual possession or custody."], "notes": []}, {"r": "s 1", "t": "Child", "n": "1", "cw": "def", "limbs": ["under 18; apparently under 18 absent positive evidence."], "notes": []}], "cc:cc-319": [{"r": "s 319(2)", "t": "Consent", "n": "5", "cw": "vitiators", "limbs": ["freely and voluntarily given … not freely and voluntarily given if obtained by force, threat, intimidation, deceit, or any fraudulent means.", "Child under 13 incapable (s 319(2)(c))."], "notes": ["five vitiators, one sibling each in the deck — write your own anchor"]}, {"r": "s 319", "t": "To sexually penetrate", "n": "1", "cw": "def", "limbs": ["vagina (incl. labia majora) / anus / urethra, any body part or object, except proper medical purposes."], "notes": []}, {"r": "s 319(1)", "t": "Sex-offence aggravation", "n": "6", "cw": "limbs", "limbs": ["armed/pretends", "in company", "does bodily harm", "act likely seriously and substantially to degrade or humiliate", "threatens to kill", "victim 13–<16."], "notes": []}], "cia:s-4": [{"r": "CIA s 4", "t": "Reasonably suspects", "n": "1", "cw": "def", "limbs": ["personally has grounds at the time … (even if subsequently found to be false or non-existent), when judged objectively, are reasonable."], "notes": []}, {"r": "s 4/5/16", "t": "Suspicion · relevance · force", "n": "3", "cw": "anchors", "limbs": ["s 4 reasonably suspects", "s 5 thing relevant to an offence (used / obtained by / committed the act is necessary to defend self/another (incl. non-imminent)", "act is a reasonable response in the circumstances as the person believes them to be."], "notes": ["s 248(3): murder → manslaughter if belief honest but response unreasonable. s 260: excessive force unlawful. \"Harmful act\" excludes Ch XXXV (criminal defamation)."]}], "cc:cc-23B": [{"r": "s 23B", "t": "Accident", "n": "2", "cw": "limbs", "limbs": ["not criminally responsible for an event which occurs by accident", "BUT (s 23B(3)) death/GBH from a deliberate use of force is not excused merely because the victim had an abnormality, defect or weakness (eggshell skull), even if unforeseeable."], "notes": []}], "cc:cc-22": [{"r": "s 22", "t": "Honest claim of right", "n": "1", "cw": "limb", "limbs": ["property offences, claim of right + no intention to defraud."], "notes": []}], "cc:cc-221": [{"r": "s 221", "t": "Aggravation", "n": "4", "cw": "limbs", "limbs": ["family relationship", "child present", "RO breach", "victim 60+."], "notes": []}], "cc:cc-80I": [{"r": "s 80I", "t": "Racial aggravation", "n": "5", "cw": "hosts", "limbs": ["313, 317, 317A, 338B, 444."], "notes": ["Scope note: racial group — hostility based on religion alone is not within s 80I."]}], "cc:cca-7": [{"r": "s 7–10", "t": "Parties", "n": "4", "cw": "routes", "limbs": ["s 7 principals (does/enables/aids/counsels)", "s 8 common purpose — withdrawal defence (s 8(2)): withdrew + communicated by words or conduct + took all reasonable steps", "s 9 counselled offence, mode immaterial", "s 10 accessory after the fact (spouse immunity s 10(2))"], "notes": ["s 562 accessory penalty: life→14, else half."]}], "cc:cc-8": [{"r": "s 7–10", "t": "Parties", "n": "4", "cw": "routes", "limbs": ["s 7 principals (does/enables/aids/counsels)", "s 8 common purpose — withdrawal defence (s 8(2)): withdrew + communicated by words or conduct + took all reasonable steps", "s 9 counselled offence, mode immaterial", "s 10 accessory after the fact (spouse immunity upefying/overpowering drug with intent re an indictable offence; 20 yrs."], "notes": []}], "cc:cc-222": [{"r": "s 222", "t": "Assault", "n": "2", "cw": "modes", "limbs": ["strikes/touches/moves or applies force of any kind, directly or indirectly, without consent (or consent by fraud)", "OR bodily act/gesture attempts or threatens with actual or apparent present ability."], "notes": ["Applies force incl. heat, light, electrical force, gas, odour. (Brady v Schatzel: unloaded gun can still assault.)"]}], "cc:cc-317A": [{"r": "s 317A", "t": "Assault with intent", "n": "3", "cw": "intents", "limbs": ["commit/facilitate a crime", "do GBH", "resist/prevent lawful arrest."], "notes": ["5 (7 agg)."]}], "cc:cc-318": [{"r": "s 318", "t": "Serious assault — protected classes (d)–(k)", "n": "10/7", "cw": "armed / else", "limbs": ["public officer (performing function OR on account of)", "public-nature function", "aiders", "railway/ferry/PT drivers", "ambulance", "FES/SES/VMRS", "hospital workers", "court security", "prison officers."], "notes": ["Penalty: armed or in company 10 yrs, else 7."]}], "cc:cc-298": [{"r": "s 298", "t": "Suffocation and strangulation", "n": "2", "cw": "limbs", "limbs": ["blocking nose, mouth or both", "applying pressure on, or to, the neck — done manually, or by using any other aid."], "notes": ["Consent is NOT an element (and s 24 mistake re consent doesn't run). Statutory alternative: s 313 only. 5 / 7 agg. Strangulation signs for statements: voice change, neck pain, tinnitus, memory loss; delayed: vocal-cord immobility, fractured larynx/hyoid."]}], "cc:cc-301": [{"r": "s 301", "t": "Wounding", "n": "1", "cw": "limb", "limbs": ["both skin layers (C (a minor) v Eisenhower); 5 yrs."], "notes": []}], "cc:cc-294": [{"r": "s 294", "t": "Act intended to cause GBH / resist arrest", "n": "3", "cw": "intents", "limbs": ["maim, disfigure, or disable", "do some grievous bodily harm", "resist or prevent lawful arrest or detention"], "notes": ["by any of 8 act limbs (wound, strike, poison, suffocate…). 20 yrs. Sits ABOVE s 297 because of the intent."]}], "cc:cc-304": [{"r": "s 304", "t": "Act or omission causing bodily harm or danger", "n": "7/20", "cw": "years", "limbs": ["duty omission/unlawful act → BH or endangerment: 7 yrs", "with intent to harm: 20 yrs (s 304(2))."], "notes": ["The school's own practical (JONES — car driven at pedestrians) charged s 304(2)(a)."]}], "cc:cc-320": [{"r": "s 320/321", "t": "Child <13 / child 13–<16 — the ladder", "n": "5", "cw": "acts", "limbs": ["penetration", "procure/incite to sexual behaviour", "indecent dealing", "procure to indecent act", "indecently record."], "notes": ["s 320: 20/20/10/10/10. s 321: 14 base, 20 if under care/supervision/authority, 7 if offender under 18.", "s 321(9) similar-age defence: believed on reasonable grounds ≥16 AND offender not more than 3 years older — excluded if under care (s 321(9a))."]}], "cc:cc-321": [{"r": "s 320/321", "t": "Child <13 / child 13–<16 — the ladder", "n": "5", "cw": "acts", "limbs": ["penetration", "procure/incite to sexual behaviour", "indecent dealing", "procure to indecent act", "indecently record."], "notes": ["s 320: 20/20/10/10/10. s 321: 14 base, 20 if under care/supervision/authority, 7 if offender under 18.", "s 321(9) similar-age defence: believed on reasonable grounds ≥16 AND offender not more than 3 years older — excluded if under care (s 321(9a))."]}], "cc:cc-321A": [{"r": "s 321A", "t": "Persistent sexual conduct", "n": "3+", "cw": "occasions", "limbs": ["sexual act on 3+ occasions, different days (NO 10-year cap — that's s 299)", "20 yrs", "acts need not be the same offence", "one in WA."], "notes": []}], "cc:cc-323": [{"r": "s 323/324", "t": "Indecent assault / aggravated", "n": "5/7", "cw": "years", "limbs": ["indecent assault 5 / aggravated 7 (Moloney v Mercer — average-person test)."], "notes": []}], "cc:cc-324": [{"r": "s 323/324", "t": "Indecent assault / aggravated", "n": "5/7", "cw": "years", "limbs": ["indecent     const bm = old("bookmarks"); if (bm) store.set("bookmarks", bm.map(s => ({ a: "cc", s })));
    const rc = old("recents"); if (rc) store.set("recents", rc.map(s => ({ a: "cc", s })));

const SHADES = ["600", "500", "700"];

/* ---------- data loading ---------- */
const loading = new Map();   // id -> Promise
let loadedCount = 0;
let loadErrors = [];

  d.byId = new Map(d.sections.map(s => [s.id, s]));

  d.sections.forEach(s => {
    if ((s.unit === "s" || s.unit === "r") && !d.byNum.has(s.num.toUpperCase())) d.byNum.set(s.num.toUpperCase(), s);

  d.chById = new Map((d.chapters || []).map(c => [c.id, c]));
  d.grpById = new Map(d.tree.map(g => [g.id, g]));
  d.secsOfCh = new Map();
  if (d.chapters && d.chapters.length) {
    d.sections.forEach(s => { if (s.ch) { if (!d.secsOfCh.has(s.ch)) d.secsOfCh.set(s.ch, []); d.secsOfCh.get(s.ch).push(s); } });
  }
  d.refsBy = new Map();
  d.sections.forEach(s => (s.rf || []).forEach(t => {

  d.inTopics = new Map();
  TOPICS.forEach(t => t.clusters.forEach(c => c.c.forEach(ch => {
    if (ch.a === d.meta.id && ch.s) {

function ensureAct(id){
  if (ACTS.has(id)) return Promise.resolve(ACTS.get(id));

    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }).then(d => {
    indexAct(d); ACTS.set(id, d); loading.delete(id); loadedCount++;
    document.dispatchEvent(new CustomEvent("act:loaded", { detail: id }));

  }).catch(err => {

  let active = 0;
  const next = () => {
    if (!queue.length) return;
    while (active < 4 && queue.length) {
      const id = queue.shift(); active++;
      ensureAct(id).catch(() => {}).finally(() => { active--; next(); });
    }
  };
  next();
}
const allLoaded = () => loadedCount >= REG.length;
