<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
<title>WA Legislation</title>
<meta name="description" content="WA criminal law, offline — 23 Acts, 10 doctrine manuals, 18 reference categories. Verbatim.">
<meta name="color-scheme" content="light dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Legislation">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F2F7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>/* WA Legislation v3 — slice 1 (reader) — Direction D tokens, hardened run-02 values */
*{box-sizing:border-box;margin:0}
:root{
 --canvas:#F2F2F7;--card:#FFFFFF;--ink:#1C1C1E;--mut:#636366;--deco:#AEAEB2;
 --line:rgba(60,60,67,.13);--press:#F4F4F8;
 --acc:#2F6FD0;--accText:#2A64BC;--acctint:#EEF3FB;
 --shadow-sm:0 1px 2px rgba(0,0,0,.04),0 8px 24px -18px rgba(0,0,0,.16);
 --shadow-lg:0 1px 2px rgba(0,0,0,.04),0 14px 40px -26px rgba(0,0,0,.2);
}
html[data-theme=dark]{
 --canvas:#000000;--card:#1C1C1E;--ink:#F2F2F7;--mut:#A1A1A8;--deco:#636366;
 --line:rgba(84,84,88,.48);--press:#2C2C2E;
 /* neutral accents for chrome outside .neutral scope (topnav/dock/toast) — same mixes as .neutral dark */
 --acc:color-mix(in srgb,#2F6FD0 78%,#16181C 22%);
 --accText:color-mix(in srgb,#2F6FD0 52%,#F2F2F7 48%);
 --acctint:color-mix(in srgb,#2F6FD0 22%,#1C1C1E 78%);
 --shadow-sm:0 1px 2px rgba(0,0,0,.3),0 8px 24px -18px rgba(0,0,0,.6);
 --shadow-lg:0 1px 2px rgba(0,0,0,.3),0 14px 40px -26px rgba(0,0,0,.7);
}
html,body{height:100%}
body{background:var(--canvas);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,sans-serif;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:none}
a{color:inherit;text-decoration:none}
a,button{cursor:pointer}
.view{display:none}
.view.on{display:block}
:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:8px}
::selection{background:#D7E4F8}
html[data-theme=dark] ::selection{background:#2A3950}
.nav-el,.cardb,button,a{transition:background-color .15s ease,color .15s ease,transform .12s ease}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
/* top nav — five surfaces (tab row wide / dock narrow), 54px to keep reader geometry */
.topnav{display:flex;align-items:center;gap:8px;padding:0 16px;height:54px;border-bottom:1px solid var(--line)}
.topnav .wordmark{display:flex;align-items:center;gap:8px;font:650 13.5px/1 inherit;letter-spacing:-.1px;margin-right:10px;border-radius:10px;padding:4px 6px 4px 4px}
.topnav .wordmark:hover{background:var(--press)}
.topnav .mark{width:24px;height:24px;border-radius:8px;background:color-mix(in srgb,#2F6FD0 78%,#16181C 22%);color:#fff;display:flex;align-items:center;justify-content:center;font:700 10px inherit;flex:none}
.tabs{display:flex;gap:2px}
.tabs a{font:600 12.5px/1 inherit;color:var(--mut);padding:8.5px 13px;border-radius:999px}
.tabs a:hover{background:var(--press);color:var(--ink)}
.tabs a[aria-current=page]{background:var(--acctint);color:var(--accText)}
.topnav .sp{flex:1}
.pill{font:600 12px inherit;border-radius:999px;padding:7px 12px;background:var(--card);box-shadow:var(--shadow-sm);color:var(--mut)}
.pill.on{background:var(--acc);color:#fff}
.pill:hover:not(.on){background:var(--press)}
/* dock — narrow only; solid surface, no glass (locked) */
.dock{display:none;position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--card);border-top:1px solid var(--line);padding:7px 6px calc(7px + env(safe-area-inset-bottom,0px));grid-template-columns:repeat(5,1fr)}
.dock a{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;border-radius:12px;color:var(--mut);font:550 10.5px/1 inherit;letter-spacing:.01em;white-space:nowrap}
.dock a svg{display:block}
.dock a[aria-current=page]{color:var(--accText)}
.dock a:active{transform:scale(.96)}
@media (max-width:899px){
 .tabs{display:none}
 .dock{display:grid}
 body[data-view=reader] .dock{display:none}
 main{padding-bottom:calc(64px + env(safe-area-inset-bottom,0px))}
 body[data-view=reader] main{padding-bottom:0}
 .topnav .wmt{display:none}
 .topnav .wordmark{margin-right:2px}
}
/* layout */
.wrap{display:grid;grid-template-columns:264px minmax(0,1fr) 264px;gap:16px;padding:16px;height:calc(100vh - 54px);min-height:0}
.railcard{background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);padding:14px 12px;overflow-y:auto;min-height:0}
.railcard h2{font:650 12px inherit;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin:4px 6px 8px}
.chap{margin-bottom:6px}
.chap > button{display:flex;gap:8px;width:100%;text-align:left;padding:7px 8px;border-radius:12px;font:600 12.5px/1.4 inherit;color:var(--ink);align-items:baseline}
.chap > button:hover{background:var(--press)}
.chap .lab{color:var(--accText);font-feature-settings:"tnum";flex:none}
.seclist{display:none;padding:2px 0 4px}
.chap.open .seclist{display:block}
.seclist a{display:flex;gap:8px;padding:5.5px 8px 5.5px 14px;border-radius:10px;font:450 12.5px/1.4 inherit;color:var(--mut);align-items:baseline}
.seclist a:hover{background:var(--press)}
.seclist a.on{background:var(--acctint);color:var(--accText);font-weight:600}
.seclist .n{font:600 11.5px inherit;font-feature-settings:"tnum";min-width:28px;flex:none}
/* reader */
.readcard{background:var(--card);border-radius:26px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.crumbs{display:flex;gap:7px;align-items:center;padding:14px 34px;border-bottom:1px solid var(--line);color:var(--mut);font-size:12.5px;flex-wrap:wrap}
.crumbs b{color:var(--ink);font-weight:550}
.crumbs .sep{color:var(--deco)}
.crumbs .actions{margin-left:auto;display:flex;gap:8px}
.abtn{display:flex;align-items:center;gap:6px;border-radius:999px;padding:6.5px 13px;font:600 12px inherit;color:var(--accText);background:var(--acctint)}
.abtn:hover{filter:brightness(.96)}
.abtn.q{color:var(--ink);background:var(--canvas)}
.abtn:active{transform:scale(.98)}
.scrollzone{flex:1;overflow-y:auto;min-height:0}
.doc{padding:0 48px;max-width:724px;margin:0 auto;width:100%;display:flex;flex-direction:column;min-height:100%}
.hero{margin:0 -48px;padding:26px 48px 16px;background:linear-gradient(180deg,var(--acctint) 0%,rgba(255,255,255,0) 88%)}
html[data-theme=dark] .hero{background:linear-gradient(180deg,var(--acctint) 0%,rgba(28,28,30,0) 88%)}
.kick{display:flex;align-items:center;gap:9px;font:600 11px inherit;letter-spacing:.06em;color:var(--mut);text-transform:uppercase;flex-wrap:wrap}
.badge{background:var(--acc);color:#fff;border-radius:8px;padding:3px 8px;font:700 10.5px inherit;letter-spacing:.03em}
.kick .pg{margin-left:auto;font-weight:500;letter-spacing:0;text-transform:none}
h1.sect{font:650 30px/1.2 inherit;letter-spacing:-.5px;margin:13px 0 10px}
h1.sect .num{color:var(--accText)}
.meta{display:flex;gap:8px;flex-wrap:wrap}
.chip{font:550 12px inherit;background:var(--card);box-shadow:inset 0 0 0 1px var(--line);border-radius:999px;padding:5px 11px;color:var(--mut)}
.chip.acc{background:var(--acc);box-shadow:none;color:#fff}
/* statute body — verbatim · size user-adjustable 15–21px via --bsz (Saved → Settings) */
.bodytext{margin-top:20px;font:400 16.5px/1.66 inherit;font-size:var(--bsz,16.5px);color:var(--ink)}
.bodytext p{margin:0 0 2px}
.bodytext .fl{margin-top:12px}
.bodytext .it{display:flex;gap:13px;padding:3.5px 0}
.bodytext .it .mk{flex:none;width:34px;color:var(--mut);font-feature-settings:"tnum"}
.bodytext .l2{padding-left:22px}
.bodytext .l3{padding-left:56px}
.bodytext .l4{padding-left:90px}
.bodytext .callout{margin:9px 0;border-radius:0 12px 12px 0;padding:9px 13px}
.bodytext .callout.pen{background:var(--acctint);border-left:2px solid var(--acc)}
.bodytext .callout.sum{background:var(--acctint);border-left:2px dashed var(--acc)}
.bodytext .callout p{margin:0}
.bodytext .callout .it{padding:3px 0}
.bodytext .co-label{font-weight:650;color:var(--accText)}
.bodytext .altrow{margin-top:22px;padding-top:15px;border-top:1px solid var(--line);font:400 13.5px inherit;color:var(--mut)}
.bodytext .alt-label{font-weight:600;color:var(--ink)}
.bodytext a.xref{color:var(--accText);font-weight:550}
.bodytext a.xref:hover{text-decoration:underline}
.bodytext pre{white-space:pre-wrap;font:400 14px/1.55 ui-monospace,Menlo,monospace;background:var(--canvas);border-radius:12px;padding:14px;overflow-x:auto}
.vbnote{margin:14px 0 0;font:500 12px inherit;color:var(--mut);background:var(--canvas);border-radius:10px;padding:8px 11px}
/* scrubber */
.scrub{margin-top:auto;padding:16px 0 18px}
.ticks{display:flex;gap:4px;align-items:center;height:14px}
.tick{flex:1;height:3.5px;border-radius:2px;background:var(--line);min-width:4px}
.tick.done{background:var(--acc);opacity:.45}
.tick.cur{background:var(--acc);height:6px;opacity:1}
.tick:hover{opacity:.8}
.sc-meta{display:flex;justify-content:space-between;gap:12px;color:var(--mut);font:500 11.5px inherit;margin-top:8px}
.sc-meta b{color:var(--ink);font-weight:550;display:block;font-size:12.5px;margin-top:1px}
.sc-meta .mid{text-align:center;color:var(--mut);flex:none;align-self:center}
.sc-meta a{max-width:42%}
.sc-meta a:hover b{color:var(--accText)}
.sc-meta .r{text-align:right}
/* dossier */
.dossier{display:flex;flex-direction:column;gap:12px;overflow-y:auto;min-height:0}
.dcard{background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);padding:15px}
.dcard .h{font:650 13px inherit;letter-spacing:-.1px;margin-bottom:9px}
.statrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat .nv{font:650 26px inherit;color:var(--accText);font-feature-settings:"tnum";letter-spacing:-.5px}
.stat .nl{font:500 11.5px inherit;color:var(--mut);margin-top:2px}
.limb{font:450 12.5px/1.5 inherit;color:var(--mut);padding:6px 0;border-top:1px solid var(--line);display:flex;gap:9px}
.limb b{color:var(--accText);font-weight:650;font-feature-settings:"tnum";flex:none}
.limb:first-of-type{border-top:none}
.note-line{font:450 12px/1.5 inherit;color:var(--mut);padding-top:6px;border-top:1px dashed var(--line);margin-top:6px}
.refrow{display:flex;justify-content:space-between;gap:10px;font:450 12.5px inherit;padding:6.5px 0;border-top:1px solid var(--line);color:var(--mut)}
.refrow:first-of-type{border-top:none}
.refrow b{font-weight:600;color:var(--ink);flex:none}
.refrow .t{text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.refrow:hover .t{color:var(--accText)}
.dbtn{display:flex;justify-content:center;width:100%;padding:10.5px;border-radius:999px;background:var(--acc);color:#fff;font:600 13px inherit}
.dbtn:hover{filter:brightness(.94)}
.dbtn:active{transform:scale(.98)}
.dbtn.q{background:var(--canvas);color:var(--ink);margin-top:8px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:var(--canvas);font:600 12.5px inherit;border-radius:999px;padding:9px 16px;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .2s,visibility .2s}
.toast.show{opacity:1;visibility:visible}
.empty{padding:60px 20px;text-align:center;color:var(--mut);font:500 13.5px inherit}
/* responsive */
@media (max-width:1119px){
 .wrap{grid-template-columns:minmax(0,1fr) 264px}
 .railcard{display:none}
}
@media (max-width:899px){
 .wrap{grid-template-columns:minmax(0,1fr);height:auto;min-height:calc(100vh - 54px)}
 .readcard{min-height:72vh}
 .dossier{overflow:visible}
 .doc{padding:0 22px}
 .hero{margin:0 -22px;padding:22px 22px 14px}
 .crumbs{padding:12px 18px}
 .crumbs .actions{width:100%;margin-left:0}
 h1.sect{font-size:25px}
 .bodytext{font-size:var(--bsz,16px)}
 .bodytext .l3{padding-left:34px}
 .bodytext .l4{padding-left:56px}
}

/* library */
.libwrap{max-width:1180px;margin:0 auto;padding:22px 20px 60px}
.libcap{font:650 13px inherit;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);margin:26px 4px 12px}
.libcap:first-child{margin-top:6px}
.libgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
.srccard{display:flex;flex-direction:column;gap:7px;background:var(--card);border-radius:20px;padding:15px;box-shadow:var(--shadow-sm)}
.srccard:hover{transform:translateY(-1px)}
.srccard:active{transform:scale(.985)}
.srccard .bar{height:4px;border-radius:2px;width:34px}
.srccard .ab{font:700 15px inherit;letter-spacing:-.2px}
.srccard .nm{font:500 12.5px/1.35 inherit;color:var(--ink)}
.srccard .ct{font:400 11px inherit;color:var(--mut)}
/* browse */
.browsewrap{max-width:860px;margin:0 auto;padding:22px 20px 60px}
.srchead{background:var(--card);border-radius:26px;box-shadow:var(--shadow-sm);padding:24px 28px;margin-bottom:16px}
.srchead .meta{margin-top:12px}
.chip.bx{cursor:pointer}
.chip.bx:hover{background:var(--press)}
.btree{display:flex;flex-direction:column;gap:10px}
.bchap{background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);overflow:hidden}
.bhead{display:flex;gap:10px;width:100%;text-align:left;padding:14px 18px;font:600 13.5px/1.45 inherit;align-items:baseline}
.bhead:hover{background:var(--press)}
.bhead .lab{color:var(--accText);font-feature-settings:"tnum";flex:none;min-width:86px}
.bhead .bt{flex:1}
.bhead .bn{color:var(--mut);font:550 12px inherit;font-feature-settings:"tnum"}
.bsecs{display:none;border-top:1px solid var(--line);padding:6px 10px 10px}
.bchap.open .bsecs{display:block}
.bsecs a{display:flex;gap:10px;padding:7px 10px;border-radius:10px;font:450 13px/1.45 inherit;color:var(--mut);align-items:baseline}
.bsecs a:hover{background:var(--press);color:var(--ink)}
.bsecs .n{font:600 12px inherit;font-feature-settings:"tnum";min-width:42px;flex:none;color:var(--accText)}
@media (max-width:899px){
 .libwrap,.browsewrap{padding:14px 14px 60px}
 .srchead{padding:18px 18px}
 .bhead .lab{min-width:70px}
}

/* ---------- slice 3 — search ---------- */
/* neutral surfaces use the app accent (CC blue), both themes (plan §3) */
.neutral{--acc:color-mix(in srgb,#2F6FD0 78%,#16181C 22%);
 --accText:color-mix(in srgb,#2F6FD0 70%,#16181C 30%);
 --acctint:color-mix(in srgb,#2F6FD0 9%,#FFFFFF 91%)}
html[data-theme=dark] .neutral{
 --accText:color-mix(in srgb,#2F6FD0 52%,#F2F2F7 48%);
 --acctint:color-mix(in srgb,#2F6FD0 22%,#1C1C1E 78%)}
kbd{font:600 10.5px/1 inherit;color:var(--mut);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:2.5px 5px;background:var(--card)}
.psearch{display:inline-flex;align-items:center;gap:7px}
.psearch svg{color:var(--mut)}
/* palette overlay */
.palette{position:fixed;inset:0;z-index:60}
.pscrim{position:absolute;inset:0;background:rgba(0,0,0,.18)}
html[data-theme=dark] .pscrim{background:rgba(0,0,0,.55)}
.pcard{position:absolute;left:50%;top:96px;transform:translateX(-50%);width:min(640px,calc(100vw - 32px));max-height:min(560px,calc(100vh - 150px));display:flex;flex-direction:column;background:var(--card);border-radius:20px;box-shadow:0 1px 2px rgba(0,0,0,.06),0 24px 80px -20px rgba(0,0,0,.4);overflow:hidden;animation:palin .16s cubic-bezier(.32,.72,0,1)}
@keyframes palin{from{opacity:0;transform:translateX(-50%) scale(.985) translateY(-4px)}to{opacity:1;transform:translateX(-50%)}}
.pinrow{display:flex;align-items:center;gap:11px;padding:15px 17px;border-bottom:1px solid var(--line);flex:none}
.pico{color:var(--mut);flex:none}
#pinput,.swinput{flex:1;border:none;outline:none;background:none;font:400 17px/1.3 inherit;color:var(--ink);min-width:0}
#pinput::placeholder,.swinput::placeholder{color:var(--deco)}
.pclear{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:999px;background:var(--canvas);color:var(--mut);flex:none}
.pclear:hover{background:var(--press)}
.pesc{flex:none}
.pchips{display:flex;gap:7px;padding:11px 15px;border-bottom:1px solid var(--line);flex:none;overflow-x:auto;scrollbar-width:none}
.pchips::-webkit-scrollbar{display:none}
.schip{font:600 12px inherit;border-radius:999px;padding:5.5px 12px;background:var(--canvas);color:var(--mut);flex:none}
.schip:hover{background:var(--press)}
.schip[aria-pressed=true]{background:var(--acc);color:#fff}
.plist{overflow-y:auto;padding:8px;min-height:0;overscroll-behavior:contain}
.prow-r{display:grid;grid-template-columns:4px auto auto minmax(0,1fr) auto;align-items:baseline;column-gap:10px;padding:9.5px 12px;border-radius:12px}
.prow-r .rb{width:4px;height:15px;border-radius:2px;align-self:center}
.prow-r .rab{font:650 10.5px inherit;letter-spacing:.04em;color:var(--mut);min-width:34px}
.prow-r .rn{font:620 13px inherit;font-feature-settings:"tnum";color:var(--accText)}
.prow-r .rn:empty{display:none}
.prow-r .rt{font:550 13.5px/1.4 inherit;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prow-r .rsrc{font:450 11px inherit;color:var(--mut);white-space:nowrap}
.prow-r .rs{grid-column:2/6;font:400 12.2px/1.5 inherit;color:var(--mut);margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.prow-r:hover{background:var(--press)}
.prow-r.on{background:var(--acctint)}
.prow-r.on .rt{color:var(--accText)}
mark{background:transparent;color:inherit;font-weight:650;text-decoration:underline;text-underline-offset:2px;text-decoration-color:var(--accText);text-decoration-thickness:1.5px}
.pdiv{font:650 10.5px inherit;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);padding:11px 12px 5px}
.pfoot{display:flex;align-items:center;gap:10px;padding:9.5px 15px;border-top:1px solid var(--line);flex:none;font:500 11.5px inherit;color:var(--mut)}
.pstat{flex:1;font-feature-settings:"tnum"}
.pkeys{display:flex;align-items:center;gap:7px}
.pall{color:var(--accText);font-weight:600;cursor:pointer;margin-left:6px}
.pall:hover{text-decoration:underline}
/* empty / recents / hints */
.pempty{padding:34px 20px 38px;text-align:center;color:var(--mut)}
.pempty svg{color:var(--deco);margin-bottom:10px}
.pempty .t{font:600 13.5px inherit;color:var(--ink);margin-bottom:4px}
.pempty .s{font:450 12.5px/1.55 inherit}
.pempty .s b{font-weight:600;color:var(--accText)}
.reccap{display:flex;align-items:baseline;justify-content:space-between;font:650 10.5px inherit;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);padding:11px 12px 5px}
.recclr{font:600 11px inherit;letter-spacing:0;text-transform:none;color:var(--mut)}
.recclr:hover{color:var(--accText)}
.recrow{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 12px;border-radius:12px;font:450 13.5px inherit;color:var(--ink)}
.recrow svg{color:var(--deco);flex:none}
.recrow:hover{background:var(--press)}
.tryrow{display:flex;gap:7px;flex-wrap:wrap;padding:6px 12px 12px}
.tryrow .schip{background:var(--canvas)}
/* search page */
.searchwrap{max-width:768px;margin:0 auto;padding:22px 20px 70px}
.swcard{display:flex;align-items:center;gap:11px;background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);padding:13px 16px;margin-bottom:12px}
.swcard .pico{color:var(--mut)}
.swchips{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding:2px}
.swchips::-webkit-scrollbar{display:none}
.swchips .schip{background:var(--card);box-shadow:var(--shadow-sm)}
.swchips .schip[aria-pressed=true]{background:var(--acc);color:#fff}
.swlist{background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);padding:8px}
.swlist:empty{display:none}

/* ---------- slice 6 — PWA first-run progress (designed state, not an afterthought) ---------- */
.swprog[hidden]{display:none!important}
.swprog{position:fixed;left:50%;transform:translateX(-50%);bottom:26px;z-index:55;display:flex;align-items:center;gap:11px;background:var(--card);border-radius:999px;padding:9px 16px;box-shadow:var(--shadow-lg)}
.swlab{font:550 11.5px inherit;color:var(--mut);font-feature-settings:"tnum";white-space:nowrap}
.swprog{--acc:color-mix(in srgb,#2F6FD0 78%,#16181C 22%);--acctint:color-mix(in srgb,#2F6FD0 9%,#FFFFFF 91%)}
html[data-theme=dark] .swprog{--acctint:color-mix(in srgb,#2F6FD0 22%,#1C1C1E 78%)}
.swtrack{width:96px;height:4px;border-radius:2px;background:var(--acctint);overflow:hidden}
html[data-theme=dark] .swtrack{background:#2C2C2E}
.swbar{display:block;height:100%;width:0;border-radius:2px;background:var(--acc);transition:width .2s ease}
@media (max-width:899px){
 .swprog{bottom:calc(80px + env(safe-area-inset-bottom,0px))}
}
body[data-view=reader] .swprog{top:64px;bottom:auto;left:auto;right:18px;transform:none}

/* milestone run 06 — Round A */
@media (max-width:899px){
 .toast{bottom:calc(80px + env(safe-area-inset-bottom,0px));z-index:60}
 body[data-view=reader] .toast{bottom:26px}
}

/* ---------- slice 7 — wide-home stat bento (≥900 only; narrow untouched) ---------- */
/* pastel families — fills carry near-black ink; deep tones for accents (refs: brandkit pastels,
   Invoca stat cards, pastel service-card grid). Dark theme: hue-into-#1C1C1E mixes, lifted inks. */
.homewrap{
 --rose:#F4D9E7;--rose-d:#8C2F5C;--sand:#F2E7CD;--sand-d:#77530F;
 --lime:#E2F0CB;--lime-d:#42661A;--violet:#E7DDF6;--violet-d:#59399A;
 --sky:#D5EBF7;--sky-d:#175E84;--indigo:#DFE3F9;--indigo-d:#3A47A4;--mint:#D7EFE0;--mint-d:#0F5F3E;
}
html[data-theme=dark] .homewrap{
 --rose:#3A2230;--rose-d:#E8A8C8;--sand:#37301D;--sand-d:#E4C684;
 --lime:#2C351D;--lime-d:#BBDC8B;--violet:#2F2741;--violet-d:#C9B5F2;
 --sky:#1E2F3A;--sky-d:#93CCEC;--indigo:#252A41;--indigo-d:#ADB8F4;--mint:#1E3327;--mint-d:#8FD9B4;
}
.bento{display:none}
@media (min-width:900px){
 .homewrap{max-width:1360px}
 .homewrap .hgrid{display:none}
 .bento{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;align-items:start;margin-top:2px}
 .mod{background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);overflow:hidden;display:flex;flex-direction:column}
 .m-hero{grid-column:span 8;grid-row:span 2}
 .m-cont{grid-column:span 4}
 .m-study{grid-column:span 4}
 .m-acts{grid-column:span 7}
 .m-rec{grid-column:span 5}
 /* module head (tinted strip on white modules) */
 .mhead{display:flex;align-items:center;gap:8px;padding:12px 16px;font:650 13px inherit;letter-spacing:-.1px}
 .mhead svg{flex:none}
 .mhead .mlink{margin-left:auto;font:600 11.5px inherit}
 .mhead.p-indigo{background:var(--indigo);color:var(--indigo-d)}
 .mhead.p-sand{background:var(--sand);color:var(--sand-d)}
 .mhead a.mlink{color:inherit}
 .mhead a.mlink:hover{text-decoration:underline}
 .mbody{padding:10px 16px 14px}
 /* hero: domain groups + tinted chips */
 .bdom{padding:9px 0 4px;border-top:1px solid var(--line)}
 .bdom:first-child{border-top:none;padding-top:4px}
 .bdh{font:650 11px inherit;letter-spacing:.05em;text-transform:uppercase;margin:0 0 7px}
 .bchips{display:flex;flex-wrap:wrap;gap:7px;padding-bottom:6px}
 .bchip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 12px 6px 9px;font:550 12.5px inherit}
 .bchip:hover{filter:brightness(.955)}
 html[data-theme=dark] .bchip:hover{filter:brightness(1.18)}
 .bchip:active{transform:scale(.97)}
 .p-rose .bdh{color:var(--rose-d)} .p-rose .bchip{background:var(--rose);color:var(--rose-d)}
 .p-sand .bdh{color:var(--sand-d)} .p-sand .bchip{background:var(--sand);color:var(--sand-d)}
 .p-lime .bdh{color:var(--lime-d)} .p-lime .bchip{background:var(--lime);color:var(--lime-d)}
 .p-violet .bdh{color:var(--violet-d)} .p-violet .bchip{background:var(--violet);color:var(--violet-d)}
 .p-sky .bdh{color:var(--sky-d)} .p-sky .bchip{background:var(--sky);color:var(--sky-d)}
 .p-indigo .bdh{color:var(--indigo-d)} .p-indigo .bchip{background:var(--indigo);color:var(--indigo-d)}
 .p-mint .bdh{color:var(--mint-d)} .p-mint .bchip{background:var(--mint);color:var(--mint-d)}
 /* filled modules (continue / study / recents) — pastel surface + dark ink + white strip */
 .mod.filled{padding:16px 16px 0}
 .mod.filled.p-sky{background:var(--sky)}
 .mod.filled.p-violet{background:var(--violet)}
 .mod.filled.p-mint{background:var(--mint)}
 .mod.filled .kick{color:color-mix(in srgb,var(--ink) 72%,transparent)}
 .mod.filled.p-sky .kick{color:var(--sky-d)}
 .mod.filled.p-violet .kick{color:var(--violet-d)}
 .mod.filled.p-mint .kick{color:var(--mint-d)}
 .bct{font:650 19px/1.3 inherit;letter-spacing:-.3px;margin:10px 0 6px;color:var(--ink)}
 .bct .num{color:var(--sky-d);font-feature-settings:"tnum"}
 .bct.dim{color:color-mix(in srgb,var(--ink) 80%,transparent)}
 .bprev{font:400 12.5px/1.6 inherit;color:color-mix(in srgb,var(--ink) 78%,transparent);margin:0 0 14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
 .bprev.dim{color:color-mix(in srgb,var(--ink) 76%,transparent)}
 .bstrip{display:flex;align-items:center;gap:10px;background:var(--card);margin:auto -16px 0;padding:12px 16px;font:600 12.5px inherit;color:var(--accText)}
 .bstrip:hover{background:var(--press)}
 .bstrip.btns{gap:8px}
 .bstrip.btns:hover{background:var(--card)}
 .dbtn.bsm{display:inline-flex;width:auto;padding:8px 16px;font-size:12px}
 .dbtn.bsm.q2{background:var(--canvas);color:var(--ink)}
 html[data-theme=dark] .dbtn.bsm.q2{background:var(--press)}
 .bmore{margin-left:auto;font:600 11.5px inherit;color:var(--accText)}
 .bmore:hover,.bstrip:not(.btns):hover{text-decoration:underline}
 /* study stats */
 .bstats{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin:10px 0 14px}
 .bstat b{font:650 22px/1.15 inherit;letter-spacing:-.5px;font-feature-settings:"tnum";color:var(--violet-d);display:block}
 .bstat span{font:500 11px inherit;color:color-mix(in srgb,var(--ink) 70%,transparent)}
 /* rows (acts / recents) */
 .rows{display:flex;flex-direction:column}
 .brow{display:grid;grid-template-columns:4px auto minmax(0,1fr) auto;align-items:center;column-gap:10px;padding:8.5px 6px;border-radius:10px;font:450 13px inherit}
 .brow .rb{width:4px;height:15px;border-radius:2px}
 .brow b{font:620 12.5px inherit;font-feature-settings:"tnum";white-space:nowrap}
 .brow .bt2{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
 .brow .bn2{font:500 11px inherit;color:var(--mut);font-feature-settings:"tnum"}
 .mod:not(.filled) .brow:hover{background:var(--press)}
 .mod.filled .brow{margin:0 -6px}
 .mod.filled .brow:hover{background:color-mix(in srgb,#FFFFFF 38%,transparent)}
 html[data-theme=dark] .mod.filled .brow:hover{background:color-mix(in srgb,#FFFFFF 7%,transparent)}
 .mod.filled .brow .bt2{color:var(--ink)}
 .mod.filled.p-mint .brow b{color:var(--mint-d)}
 .mod.filled.p-sky .brow b{color:var(--sky-d)}
 .m-rec .rows{margin-bottom:2px}
 .bempty{font:450 12.5px inherit;color:color-mix(in srgb,var(--ink) 76%,transparent);padding:6px 0 14px}
 /* top bar search becomes a field-look control on wide */
 .psearch{min-width:248px;justify-content:flex-start;background:var(--canvas);box-shadow:inset 0 0 0 1px var(--line);border-radius:12px;color:var(--mut)}
 html[data-theme=dark] .psearch{background:var(--press)}
 .psearch:hover:not(.on){background:var(--card);box-shadow:inset 0 0 0 1px var(--line),var(--shadow-sm)}
 .psearch kbd{margin-left:auto}
}
@media (min-width:1120px){
 .m-cont{grid-column:span 4}
 .m-study{grid-column:span 4}
}
</style>

<script>/* WA Legislation v3 — slice 1: reader. Verbatim rule: section html injected untouched;

/* migration — v1 (wacc:*) and v9 (wal:*) localStorage → wal3-* (runs once, before theme/size init) */
(function migrateLegacy(){
  if (localStorage.getItem("wal3-migrated")) return;
  try{
    const J = k => { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; };
    const waccBm = J("wacc:bookmarks"), waccRc = J("wacc:recents"), waccSt = J("wacc:settings");
    const bm = J("wal:bookmarks") || (Array.isArray(waccBm) ? waccBm.map(s => ({ a:"cc", s })) : null);
    const rc = J("wal:recents")   || (Array.isArray(waccRc) ? waccRc.map(s => ({ a:"cc", s })) : null);
    const st = J("wal:settings")  || waccSt;
    const qs = J("wal:queries");
    if (Array.isArray(bm) && !localStorage.getItem("wal3-bm"))
      localStorage.setItem("wal3-bm", JSON.stringify(bm.filter(x => x && x.a && x.s).slice(0, 100)));
    if (Array.isArray(rc) && !localStorage.getItem("wal3-rread"))
      localStorage.setItem("wal3-rread", JSON.stringify(rc.filter(x => x && x.a && x.s).slice(0, 30).map(x => ({ a:x.a, s:x.s, ts:0 }))));
    if (Array.isArray(qs) && !localStorage.getItem("wal3-recents"))
      localStorage.setItem("wal3-recents", JSON.stringify(qs.filter(x => typeof x === "string").slice(0, 8)));
    if (st && typeof st === "object"){
      if (!localStorage.getItem("wal3-theme") && (st.theme === "light" || st.theme === "dark"))
        localStorage.setItem("wal3-theme", st.theme);
      if (!localStorage.getItem("wal3-size") && typeof st.scale === "number" && st.scale !== 1)
        localStorage.setItem("wal3-size", String(Math.max(15, Math.min(21, Math.round(16.5 * st.scale)))));
    }
  }catch(e){}
  localStorage.setItem("wal3-migrated", "1");
})();

/* theme — wal3-theme: "auto" | "light" | "dark" ("auto" follows the system, default) */
const themeBtn = $("#themebtn");
const sysDark = matchMedia("(prefers-color-scheme: dark)");
const themePref = () => localStorage.getItem("wal3-theme") || "auto";
const resolveTheme = p => p === "auto" ? (sysDark.matches ? "dark" : "light") : p;
function setTheme(t){ localStorage.setItem("wal3-theme", t); applyTheme(); }
function applyTheme(){
  const r = resolveTheme(themePref());
  document.documentElement.dataset.theme = r;
  themeBtn.textContent = r === "dark" ? "Light" : "Dark";
}
applyTheme();
sysDark.addEventListener("change", () => { if (themePref() === "auto") applyTheme(); });
themeBtn.addEventListener("click", () =>
  setTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark"));

/* statute text size — wal3-size: 15–21 px (absent = 16.5 default) */
function applySize(){
  const v = parseInt(localStorage.getItem("wal3-size"), 10);
  if (v >= 15 && v <= 21) document.documentElement.style.setProperty("--bsz", v + "px");
  else document.documentElement.style.removeProperty("--bsz");
}
applySize();

/* act accent */
function applyAccent(act){
  const r = document.documentElement.style, c = act.color;
  /* --acc = fills carrying white text: constant dark mix so white stays >=4.5:1 for every act hue, both themes */
  r.setProperty("--acc", `color-mix(in srgb, ${c} 78%, #16181C 22%)`);
  if (document.documentElement.dataset.theme === "dark"){
    r.setProperty("--accText", `color-mix(in srgb, ${c} 52%, #F2F2F7 48%)`);
    r.setProperty("--acctint", `color-mix(in srgb, ${c} 22%, #1C1C1E 78%)`);
  } else {
    r.setProperty("--accText", `color-mix(in srgb, ${c} 70%, #16181C 30%)`);
    r.setProperty("--acctint", `color-mix(in srgb, ${c} 9%, #FFFFFF 91%)`);
  }
}
new MutationObserver(() => { if (cur.act) applyAccent(byId[cur.act]); })
  .observe(document.documentElement, { attributes:true, attributeFilter:["data-theme"] });
/* neutral views drop the inline act accent so chrome (topnav/dock) returns to app blue */
function clearAccent(){
  const r = document.documentElement.style;
  r.removeProperty("--acc"); r.removeProperty("--accText"); r.removeProperty("--acctint");
}

/* data — in-flight promises memoised so index build + navigation never double-fetch */
const _loading = {};
function loadAct(id){
  if (cache[id]) return Promise.resolve(cache[id]);
  return _loading[id] ??= (async () => {
    const d = await (await fetch(`data/${id}.json`)).json();
    d._secById = Object.fromEntries(d.sections.map(s => [s.id, s]));
    d._chap = {};
    for (const s of d.sections){ const k = s.ch || s.grp || "all";
      (d._chap[k] = d._chap[k] || []).push(s); }
    cache[id] = d; delete _loading[id]; return d;
  })();
}

/* router */
function nav(act, sec){ location.hash = `#/${act}/${sec}`; }
/* v1/v9 URL migration shim — old-world routes land on their new homes (plan §1) */
function legacyHash(){
  const h = location.hash || ""; let m;
  if (h === "#/home" || h === "#/home/") return "#/";
  if (h === "#/acts") return "#/library";
  if (h === "#/code") return "#/cc";
  if (h === "#/more" || h === "#/settings") return "#/saved";
  if (m = h.match(/^#\/a\/([a-z0-9]+)$/)) return byId[m[1]] ? `#/${m[1]}` : "#/library";
  if (m = h.match(/^#\/s\/([a-z0-9]+)\/([\w.-]+)$/)) return `#/${m[1]}/${m[2]}`;
  if (m = h.match(/^#\/s\/((?:cc|ca|cca|sch)-[\w.-]+)$/)) return `#/cc/${m[1]}`;      /* v1: #/s/cc-392 */
  if (m = h.match(/^#\/ch\/([a-z0-9]+)\/[\w.-]+$/)) return byId[m[1]] ? `#/${m[1]}` : "#/library";
  if (m = h.match(/^#\/ch\/ch\d+$/)) return "#/cc";                                   /* v1: #/ch/ch3 */

async function route(){

/* migrated v9 entries arrive as bare {a,s} — resolve titles once, in idle, then persist */
let _resolvedM = false;
async function resolveMigratedTitles(){
  if (_resolvedM) return;
  const fix = list => list.filter(x => x && byId[x.a] && !x.t).map(x => x.a);
  const bmM = fix(bmGet()), rrM = fix(rreadGet());
  const actIds = [...new Set([...bmM, ...rrM])].slice(0, 8);
  if (!actIds.length){ _resolvedM = true; return; }
  await Promise.all(actIds.map(id => loadAct(id).catch(() => null)));
  const patch = key => {
    const list = lsGet(key, []); let dirty = false, dropped = 0;
    const out = list.filter(x => {
      if (!x || !byId[x.a]) { dropped++; dirty = true; return false; }
      if (x.t) return true;
      const d = cache[x.a]; if (!d) return true;
      const s = d._secById[x.s];
      if (!s){ dropped++; dirty = true; return false; }
      x.t = s.t || ""; x.n = s.num ?? null; dirty = true; return true;
    });
    if (dirty) localStorage.setItem(key, JSON.stringify(out));
    return dropped;
  };
  const dropB = patch("wal3-bm"); patch("wal3-rread");
  _resolvedM = true;
  if (curView === "saved"){ renderSaved(); if (dropB) toast(`${dropB} imported bookmark${dropB > 1 ? "s" : ""} no longer match`); }
}

/* ================= slice 3 — search =================
   Two-phase runtime index, no build-time index shipped (plan §4):
   phase 1 titles (as each source JSON lands, priority order), phase 2 bodies
   (lowercased in idle chunks; query-time scan is chunked + cancellable).
   Verbatim rule: index reads shipped t/b fields only; rendering escapes, never rewrites. */
const IDX = { titles: [], tReady: new Set(), bReady: new Set(), started: false, doneT: false, doneB: false };
const SRC_ORDER = [...ACTS].sort((a, b) => (b.pr || 0) - (a.pr || 0));
const PRI = Object.fromEntries(ACTS.map((a, i) => [a.id, (a.pr || 0) * 1e4 - i]));
const ALIAS = (() => { const m = new Map();
  for (const a of ACTS){ m.set(a.id, a.id); m.set(a.abbr.toLowerCase(), a.id);
    for (const al of (a.aliases || [])) m.set(al.toLowerCase(), a.id); }
  return m; })();
const idle = cb => (window.requestIdleCallback ? requestIdleCallback(cb, { timeout: 300 }) : setTimeout(cb, 16));
let _idxHooks = [];
function emitIdx(){ for (const fn of _idxHooks) fn(); }

async function buildIndex(){
  if (IDX.started) return; IDX.started = true;
  const queue = SRC_ORDER.map(a => a.id);
  await Promise.all(Array.from({ length: 4 }, async () => {
    while (queue.length){
      const id = queue.shift();
      try {
        const d = await loadAct(id);
        for (const s of d.sections) IDX.titles.push({ a: id, id: s.id, u: s.unit,
          num: s.num ?? null, ln: String(s.num ?? "").toLowerCase(), t: s.t || "", lt: (s.t || "").toLowerCase() });
      } catch (e) { console.warn("index: failed " + id); }
      IDX.tReady.add(id); emitIdx();
    }
  }));
  IDX.doneT = true; emitIdx();
  for (const a of SRC_ORDER){                      /* phase 2: lower bodies in idle chunks */
    const d = cache[a.id]; if (!d){ IDX.bReady.add(a.id); continue; }
    let i = 0;
    while (i < d.sections.length){
      const t0 = performance.now();
      while (i < d.sections.length && performance.now() - t0 < 8){
        const s = d.sections[i++]; if (s._lb === undefined) s._lb = (s.b || "").toLowerCase(); }
      await new Promise(idle);
    }
    IDX.bReady.add(a.id); emitIdx();
  }
  IDX.doneB = true; emitIdx();
}

/* query grammar: [act-alias] [s-number | words]  e.g. "cia 128", "392", "burglary" */
function parseQuery(raw){
  const q = raw.trim().replace(/\s+/g, " ");
  if (!q) return null;
  let scopeSrc = null, aliasTok = null, rest = q;
  const sp = q.indexOf(" ");
  const first = (sp < 0 ? q : q.slice(0, sp)).toLowerCase();
  if (first.length >= 2 && ALIAS.has(first)){
    scopeSrc = ALIAS.get(first); aliasTok = first; rest = sp < 0 ? "" : q.slice(sp + 1); }
  const nm = /^s?\.?\s?(\d+[a-z]{0,2})\.?$/i.exec(rest);
  return { raw: q, scopeSrc, aliasTok, rest, lrest: rest.toLowerCase(),
    num: nm ? nm[1].toLowerCase() : null,
    toks: rest.toLowerCase().split(" ").filter(Boolean) };
}
const catOf = a => a.cat || "act";
const inCat = (id, cat) => cat === "all" || catOf(byId[id]) === cat;
const byPri = (x, y) => (PRI[y.a] - PRI[x.a]);

function titleHits(P, cat, cap){
  const out = [], seen = new Set();
  const ok = e => (!P.scopeSrc || e.a === P.scopeSrc) && inCat(e.a, cat);
  const push = e => { const k = e.a + ":" + e.id;
    if (!seen.has(k)){ seen.add(k); out.push(e); } };
  if (P.num){
    const ex = [], pre = [];
    for (const e of IDX.titles){
      if (!ok(e) || byId[e.a].cat) continue;          /* number tiers: acts only — doc/ref nums are synthetic */
      if (e.ln === P.num) ex.push(e);
      else if (P.num.length >= 2 && e.ln.startsWith(P.num)) pre.push(e); }
    const secFirst = (x, y) => byPri(x, y) || (y.u === "s") - (x.u === "s");  /* statute sections outrank schedule items */
    ex.sort(secFirst); pre.sort(secFirst);
    /* R2.2: an exact section hit means the user typed a section — don't drown it in prefix noise */
    const preCap = ex.length ? (P.scopeSrc ? 3 : 6) : 24;
    for (const e of ex) push(e); for (const e of pre.slice(0, preCap)) push(e);
  }
  if (P.toks.length && !P.num){   /* R2.2: pure-number queries are number-first — generic digit-in-title matches are noise (bodies still scanned) */
    const t1 = [], t2 = [], t3 = [];
    for (const e of IDX.titles){
      if (!ok(e)) continue;
      const lt = e.lt; let all = true, ws = false;
      for (const tk of P.toks){
        const ix = lt.indexOf(tk);
        if (ix < 0){ all = false; break; }
        if (ix === 0 || " (—–-/".includes(lt[ix - 1])) ws = true; }
      if (!all) continue;
      (lt.startsWith(P.lrest) ? t1 : ws ? t2 : t3).push(e); }
    t1.sort(byPri); t2.sort(byPri); t3.sort(byPri);
    for (const e of [...t1, ...t2, ...t3]) push(e);
  }
  return { rows: out.slice(0, cap), total: out.length };
}

/* streaming full-text scan — chunked, cancellable, dedupes against title rows */
async function bodySearch(P, cat, skipKeys, cap, isLive, emit){
  if (!P.toks.length){ emit([], true); return; }
  const found = [];
  for (const a of SRC_ORDER){
    if (P.scopeSrc && a.id !== P.scopeSrc) continue;
    if (!inCat(a.id, cat)) continue;
    const d = cache[a.id]; if (!d) continue;
    let i = 0;
    while (i < d.sections.length){
      const t0 = performance.now();
      for (; i < d.sections.length && performance.now() - t0 < 6; i++){
        const s = d.sections[i];
        const lb = s._lb ?? (s._lb = (s.b || "").toLowerCase());
        let all = true;
        for (const tk of P.toks){ if (lb.indexOf(tk) < 0){ all = false; break; } }
        if (!all || skipKeys.has(a.id + ":" + s.id)) continue;
        found.push({ a: a.id, id: s.id, u: s.unit, num: s.num ?? null, t: s.t || "", snip: snippet(s.b || "", P.toks) });
        if (found.length >= cap){ emit(found, true); return; }
      }
      emit(found, false);
      await new Promise(idle);
      if (!isLive()) return;
    }
  }
  emit(found, true);
}

const esc = t => t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
function marks(text, toks){
  const lt = text.toLowerCase(), ms = [];
  for (const tk of toks){ let i = 0;
    while (tk && (i = lt.indexOf(tk, i)) >= 0){ ms.push([i, i + tk.length]); i += tk.length; } }
  if (!ms.length) return null;
  ms.sort((a, b) => a[0] - b[0]);
  const mg = [ms[0].slice()];
  for (const m of ms.slice(1)){ const L = mg[mg.length - 1];
    if (m[0] <= L[1]) L[1] = Math.max(L[1], m[1]); else mg.push(m.slice()); }
  return mg;
}
function hi(text, toks){
  const mg = toks && toks.length ? marks(text, toks) : null;
  if (!mg) return esc(text);
  let out = "", p = 0;
  for (const [s, e] of mg){ out += esc(text.slice(p, s)) + "<mark>" + esc(text.slice(s, e)) + "</mark>"; p = e; }
  return out + esc(text.slice(p));
}
function snippet(body, toks){
  const sq = body.replace(/\s+/g, " ");
  const mg = marks(sq, toks); if (!mg) return "";
  const [s, e] = mg[0]; let a = Math.max(0, s - 64);
  if (a > 0){ const w = sq.indexOf(" ", a); if (w > -1 && w < s) a = w + 1; }  /* R2.6: never start mid-word */
  const b = Math.min(sq.length, e + 110);
  return (a > 0 ? "…" : "") + hi(sq.slice(a, b), toks) + (b < sq.length ? "…" : "");
}

function runPal(keep){

  const kKb = keep && PAL.kb, kAct = PAL.active;
  PAL.P = parseQuery(PAL.q); PAL.active = 0; PAL.runId++; clearTimeout(PAL._bt);
  PAL.bodyRows = []; PAL.searching = false; if (!keep) PAL.kb = false;
  if (!PAL.P){ PAL.rows = []; PAL.total = 0; paintPal(); return; }
  if (PAL.P.scopeSrc && !PAL.P.rest){

  PAL.searching = !!PAL.P.toks.length; paintPal();
  if (PAL.searching){

function openHit(C, closeFn){

  else if (e.key === "ArrowUp" && n){ e.preventDefault(); PAL.kb = true; PAL.active = (PAL.active - 1 + n) % n; paintPal(); seeActive(plist, "popt", PAL.active); }
  else if (e.key === "Home" && n && PAL.kb){ e.preventDefault(); PAL.active = 0; paintPal(); seeActive(plist, "popt", 0); }
  else if (e.key === "End" && n && PAL.kb){ e.preventDefault(); PAL.active = n - 1; paintPal(); seeActive(plist, "popt", n - 1); }

/* ================= slice 4 — study tools =================

let STUDY = null, _studyP = null;
function loadStudy(){
  if (STUDY) return Promise.resolve(STUDY);
  return _studyP ??= fetch("data/study.json").then(r => r.json()).then(d => (STUDY = d));
}
const shuf = a => { for (let i = a.length - 1; i > 0; i--){ const j = Math.random() * (i + 1) | 0; [a[i], a[j]] = [a[j], a[i]]; } return a; };
const SW = () => $("#view-study .studywrap");

const accBg = c => `color-mix(in srgb, ${c} 78%, #16181C 22%)`;
const wordTrim = (t, n) => { const c = t.slice(0, n); return c.length < t.length ? c.replace(/\s+\S*$/, "") : c; };  /* same mix as applyAccent — white text ≥4.5:1 on every act hue */

function extractPen(s){
  if (s._pen !== undefined) return s._pen;
  if (!s.h || !/callout (?:pen|sum)/.test(s.h)) return (s._pen = null);
  const doc = new DOMParser().parseFromString(s.h, "text/html");
  const el = doc.querySelector(".callout.pen p, .callout.sum p");
  return (s._pen = el ? el.textContent.replace(/\s+/g, " ").trim().slice(0, 220) : null);
}

async function renderStudy(sub, a, b){
  if (!sub){ renderStudyHome(); return; }
  if (sub === "drill"){ renderDrill(); return; }

/* ---------- drill ---------- */
const DR = { stage: "scope", scope: "all", deck: [], i: 0, revealed: false, again: 0, seen: 0, total: 0 };
function drillDeck(scope){
  const cards = [];
  for (const [key, arr] of Object.entries(SCAFF)){
    const act = key.split(":")[0];
    if (scope !== "all" && act !== scope) continue;
    for (const c of arr) cards.push({ key, act, sec: key.split(":")[1], c });
  }
  return shuf(cards);
}
function renderDrill(){
  DR.stage = "scope"; DR.scope = localStorage.getItem("wal3-drill-scope") || "all";
  paintDrill();
}

    w.innerHTML = `${backBtn("#/study", "Study")}

  }

        <div class="kick"><span class="badge" style="background:${accBg(A.color)}">${A.abbr}</span><span>${esc(c.r)}</span></div>
        <h2 class="dtitle">${esc(c.t)}</h2>
        <div class="dprompt">Must prove — <b>${esc(String(c.n))}</b> ${esc(c.cw || "")}</div>
        <div aria-live="polite">${DR.revealed ? `<ol class="dlimbs">${c.limbs.map(l => `<li>${esc(l)}</li>`).join("")}</ol>

      </div>

}

/* ---------- quiz ---------- */
const QZ = { stage: "scope", scope: "cc", qs: [], i: 0, picked: -1, score: 0 };
function qPools(d){
  const secs = d.sections.filter(s => s.unit === "s" && s.num && s.t);
  return { secs, pens: secs.filter(s => extractPen(s)), alts: secs.filter(s => s.alt) };
}
function mkQ(type, act, d, used){
  const { secs, pens, alts } = d._pools || (d._pools = qPools(d));
  const pickFrom = type === "pen" ? pens : type === "alt" ? alts : secs;
  const avail = pickFrom.filter(s => !used.has(act.id + s.id));
  if (avail.length < 1 || pickFrom.length < 4) return null;
  const sec = avail[Math.random() * avail.length | 0]; used.add(act.id + sec.id);
  const near = pool => { const i = pool.indexOf(sec); const w = pool.filter((x, j) => x !== sec && Math.abs(j - (i < 0 ? 0 : i)) <= 18); return w.length >= 3 ? w : pool.filter(x => x !== sec); };
  const distinct = (arr, get) => { const out = [], seen = new Set([get(sec)]); for (const x of shuf(arr.slice())){ const v = get(x); if (!seen.has(v)){ seen.add(v); out.push(x); } if (out.length === 3) break; } return out; };
  let stem, hint, get;
  if (type === "nt"){ stem = `s. ${sec.num}`; hint = "Which is the title?"; get = s => s.t; }
  else if (type === "tn"){ stem = sec.t; hint = "Which section number?"; get = s => "s. " + s.num; }
  else if (type === "pen"){ stem = `s. ${sec.num} — ${sec.t}`; hint = "Which is the penalty line?"; get = s => extractPen(s); }
  else { stem = `s. ${sec.num} — ${sec.t}`; hint = "Which is its alternative-offence line?"; get = s => s.alt; }
  const ds = distinct(near(pickFrom), get);
  if (ds.length < 3) return null;
  const opts = shuf([{ label: get(sec), ok: true }, ...ds.map(x => ({ label: get(x), ok: false }))]);
  return { type, act: act.id, sec: sec.id, num: sec.num, t: sec.t, stem, hint, opts, picked: -1 };
}
async function buildQuiz(scope){
  const ids = scope === "mix" ? QUIZ_ACTS : [scope];
  const ds = {}; for (const id of ids) ds[id] = await loadAct(id);
  const used = new Set(), qs = [];
  const types = shuf(["nt", "tn", "pen", "alt", "nt", "tn", "pen", "alt", "nt", "tn"]);
  let guard = 60;
  while (qs.length < 10 && guard-- > 0){
    const t = types[qs.length % types.length];
    const id = ids[Math.random() * ids.length | 0];
    const q = mkQ(t, byId[id], ds[id], used);
    if (q) qs.push(q); else types.push(types.splice(qs.length % types.length, 1)[0]);
  }
  return qs;
}
function renderQuiz(){ QZ.stage = "scope"; QZ.scope = localStorage.getItem("wal3-quiz-scope") || "cc"; paintQuiz(); }
function paintQuiz(){
  const w = SW();
  if (QZ.stage === "scope"){
    w.innerHTML = `${backBtn("#/study", "Study")}
      <h1 class="stitle">Section quiz</h1>
      <p class="ssub">Ten questions. Every answer string is shipped verbatim text — titles, numbers, penalty lines, alternative-offence lines.<span class="kbhint"> Answer with <kbd>1</kbd>–<kbd>4</kbd>, advance with <kbd>↩</kbd>.</span></p>
      <div class="scopecard">
        <div class="sk2">Scope</div>
        <div class="pchips" role="group" aria-label="Quiz scope">
          <button class="schip" data-scope="mix" aria-pressed="${QZ.scope === "mix"}">All</button>
          ${QUIZ_ACTS.map(id => `<button class="schip" data-scope="${id}" aria-pressed="${QZ.scope === id}">${byId[id].abbr}</button>`).join("")}
        </div>
        <button class="dbtn start" id="qzstart">Start quiz</button>
      </div>`;
    w.querySelector(".pchips").onclick = e => { const c = e.target.closest("[data-scope]"); if (!c) return;
      QZ.scope = c.dataset.scope; localStorage.setItem("wal3-quiz-scope", QZ.scope);
      for (const x of w.querySelectorAll("[data-scope]")) x.setAttribute("aria-pressed", String(x.dataset.scope === QZ.scope)); };
    $("#qzstart").onclick = async () => {
      const b = $("#qzstart"); if (b.disabled) return;
      b.disabled = true; b.textContent = "Building…";
      QZ.qs = await buildQuiz(QZ.scope); QZ.i = 0; QZ.score = 0; QZ.stage = "run"; paintQuiz(); };
    return;
  }
  if (QZ.stage === "run"){
    const q = QZ.qs[QZ.i];
    if (!q){ QZ.stage = "done"; paintQuiz(); return; }
    const A = byId[q.act], answered = q.picked >= 0;
    const pct = Math.round(100 * QZ.i / QZ.qs.length);
    const fresh = QZ._li !== QZ.i; QZ._li = QZ.i;
    w.innerHTML = `${backBtn("#/study/quiz", "Exit quiz")}
      <h1 class="vh">Section quiz — question ${QZ.i + 1} of ${QZ.qs.length}</h1>
      <div class="sprog" role="progressbar" aria-valuenow="${QZ.i}" aria-valuemin="0" aria-valuemax="${QZ.qs.length}" aria-label="Quiz progress"><span style="width:${pct}%"></span></div>
      <div class="smeta" aria-live="polite">${QZ.i + 1} of ${QZ.qs.length} · ${QZ.score} correct</div>
      <div class="dcardbig${fresh ? " anim" : ""}">
        <div class="kick"><span class="badge" style="background:${accBg(A.color)}">${A.abbr}</span><span>${esc(byId[q.act].short)}</span></div>
        <div class="qhint">${esc(q.hint)}</div>
        <h2 class="dtitle qstem${q.stem.length > 48 ? " long" : ""}">${esc(q.stem)}</h2>
        <div class="qopts" role="group" aria-label="Answers">
        ${q.opts.map((o, j) => `<button class="qopt${answered ? (o.ok ? " ok" : j === q.picked ? " bad" : " dim") : ""}" data-j="${j}" ${answered ? "disabled" : ""} aria-label="Option ${j + 1}${answered && o.ok ? " — correct" : answered && j === q.picked ? " — your pick, incorrect" : ""}">
          <kbd>${j + 1}</kbd><span>${esc(o.label)}</span>
          ${answered && o.ok ? `<svg class="qi" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>` : ""}
          ${answered && !o.ok && j === q.picked ? `<svg class="qi" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>` : ""}
        </button>`).join("")}
        </div>
        ${answered ? `<div class="srsay vh" aria-live="polite">${q.opts[q.picked].ok ? "Correct." : "Incorrect. Correct answer: " + esc(q.opts.find(o => o.ok).label)}</div>
        <div class="dactions"><a class="dopen" href="#/${q.act}/${q.sec}">Open s. ${esc(String(q.num))} →</a><span class="sp2"></span><button class="dbtn" id="qnext">${QZ.i + 1 === QZ.qs.length ? "Finish" : "Next"} <kbd class="kbhint">↩</kbd></button></div>` : ""}
      </div>`;
    if (!answered){ w.querySelector(".qopts").onclick = e => { const b = e.target.closest("[data-j]"); if (!b) return;
      q.picked = +b.dataset.j; if (q.opts[q.picked].ok) QZ.score++; paintQuiz(); }; }
    else $("#qnext").onclick = () => { QZ.i++; paintQuiz(); };
    return;
  }
  /* done */
  const ic = okk => okk
    ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>'
    : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>';
  const rows = QZ.qs.map((q, i) => { const A = byId[q.act], right = q.opts[q.picked] && q.opts[q.picked].ok;
    return `<a class="refrow qrev" href="#/${q.act}/${q.sec}">
      <b class="${right ? "good" : "miss"}">${ic(right)} ${A.abbr} s. ${esc(String(q.num))}<span class="vh">${right ? " correct" : " incorrect"}</span></b><span class="t">${esc(q.t)}</span></a>`; }).join("");
  try { localStorage.setItem("wal3-quizlast", JSON.stringify({ score: QZ.score, total: QZ.qs.length, scope: QZ.scope, ts: Date.now() })); } catch(e){}
  w.innerHTML = `${backBtn("#/study", "Study")}
    <h1 class="vh">Section quiz — summary</h1>
    <div class="dcardbig done">
      <h2 class="dtitle">Score ${QZ.score} / ${QZ.qs.length}</h2>
      <div class="qreview">${rows}</div>
      <div class="dactions"><button class="dbtn q half" id="qzre">Change scope</button><button class="dbtn half" id="qzgo">Run again</button></div>
    </div>`;
  $("#qzre").onclick = () => { QZ.stage = "scope"; paintQuiz(); };
  $("#qzgo").onclick = async () => { QZ.qs = await buildQuiz(QZ.scope); QZ.i = 0; QZ.score = 0; QZ.stage = "run"; paintQuiz(); };
}

async function renderExList(){
  const st = await loadStudy();
  const groups = {};
  for (const key of Object.keys(st.scen)){ const a = key.split(":")[0]; (groups[a] = groups[a] || []).push(key); }
  await Promise.all(Object.keys(groups).map(loadAct));   /* section numbers for the ref lines */
  SW().innerHTML = `${backBtn("#/study", "Study")}
    <h1 class="stitle">Worked examples</h1>
    <p class="ssub">Authored fact patterns for study — the element checklists under each are quoted verbatim from the section at build time.</p>` +
    Object.entries(groups).map(([a, keys]) => {
      const A = byId[a];
      return `<h2 class="libcap">${A.short} · ${keys.length}</h2><div class="exgrid">` +
        keys.map(key => { const v = st.scen[key]; const sid = key.split(":")[1];
          const d = cache[a], sec = d && d._secById[sid];
          return `<a class="excard" href="#/study/ex/${a}/${sid}">
            <span class="bar" style="background:${A.color}"></span>
            <span class="exh">${esc(v.h)}</span>
            <span class="exref">${A.abbr}${sec && sec.num ? " s. " + esc(String(sec.num)) : ""}</span>
            <span class="exfact">${esc(wordTrim(v.fact, 110))}…</span></a>`; }).join("") + `</div>`;
    }).join("");
}

      <div class="dactions"><a class="dopen" href="#/${a}/${sid}">Open ${sec && sec.num ? `s. ${esc(String(sec.num))}` : "section"} →</a></div>

}

}

/* study keyboard: drill Space/1/2 · quiz 1-4/Enter */
addEventListener("keydown", e => {
  if (!$("#view-study").classList.contains("on") || PAL.open) return;
  const t = e.target;
  if (t && (/INPUT|TEXTAREA|SELECT/.test(t.tagName) || t.isContentEditable)) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const sub = (location.hash.match(/^#\/study\/(\w+)/) || [])[1];
  if (sub === "drill"){
    if (DR.stage === "run"){
      if (e.key === " " && !DR.revealed){ e.preventDefault(); DR.revealed = true; paintDrill(); }
      else if (DR.revealed && e.key === "1"){ e.preventDefault(); $("#dagain") && $("#dagain").click(); }
      else if (DR.revealed && e.key === "2"){ e.preventDefault(); $("#dgot") && $("#dgot").click(); }
      else if (e.key === "Escape"){ e.preventDefault(); DR.stage = "scope"; paintDrill(); }
    } else if (DR.stage === "scope" && e.key === "Enter"){ e.preventDefault(); $("#drstart") && $("#drstart").click(); }
  } else if (sub === "quiz"){
    if (QZ.stage === "run"){
      const q = QZ.qs[QZ.i]; if (!q) return;
      if (q.picked < 0 && /^[1-4]$/.test(e.key)){ e.preventDefault(); const b = SW().querySelector(`.qopt[data-j="${+e.key - 1}"]`); if (b) b.click(); }
      else if (q.picked >= 0 && e.key === "Enter"){ e.preventDefault(); $("#qnext") && $("#qnext").click(); }
      else if (e.key === "Escape"){ e.preventDefault(); QZ.stage = "scope"; paintQuiz(); }
    } else if (QZ.stage === "scope" && e.key === "Enter"){ e.preventDefault(); $("#qzstart") && $("#qzstart").click(); }
  }
});

addEventListener("keydown", e => {                             /* Esc grammar: topic detail -> hub */
  if (e.key !== "Escape" || PAL.open) return;
  const t = e.target;
  if (t && (/INPUT|TEXTAREA|SELECT/.test(t.tagName) || t.isContentEditable)) return;
  if (curView === "topics" && $("#view-topic").classList.contains("on")){ e.preventDefault(); location.hash = "#/topics"; }
});

let _idxRaf = false;
_idxHooks.push(() => {
  if (_idxRaf) return; _idxRaf = true;
  requestAnimationFrame(() => { _idxRaf = false;
    if (PAL.open) PAL.P ? runPal(true) : paintPal();
    if ($("#view-search").classList.contains("on") && SP.P) runSP(true); });
});

/* milestone run 06 B1 — re-tapping the active tab/dock item scrolls to top (iOS convention) */
document.addEventListener("click", e => {
  const a = e.target.closest("[data-nav]"); if (!a) return;
  const target = a.getAttribute("href");
  if (location.hash === target || (target === "#/" && (location.hash === "" || location.hash === "#/")))
    scrollTo({ top: 0, behavior: matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth" });
});

/* ================= slice 6 — PWA ================= */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")){
  if ("BroadcastChannel" in window){
    const bc = new BroadcastChannel("wal3-sw");
    const sp = $("#swprog"), bar = $("#swbar"), lab = $("#swlab");
    let shown = false;
    bc.onmessage = ev => {
      const m = ev.data || {};
      const first = !localStorage.getItem("wal3-offline");
      if (m.t === "prog" && first){
        if (!shown){ sp.hidden = false; shown = true; }
        bar.style.width = Math.round(m.done / m.total * 100) + "%";
        lab.textContent = `Preparing offline · ${m.done}/${m.total}`;
      } else if (m.t === "done"){
        localStorage.setItem("wal3-offline", "1");
        sp.hidden = true; shown = false;
        if (first) toast("Available offline");
        const ab = $("#aboff"); if (ab) ab.textContent = "Ready — full library cached";
      }
    };
  }
  addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}

route();
