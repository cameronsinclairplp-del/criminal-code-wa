const scrollMem = {};
function go(route, replace){
  if (replace) location.replace("#" + route); else location.hash = route;
}
function parseHash(){
  let h = (location.hash || "#/home").slice(1);
  const [path, qs] = h.split("?");
  let seg = path.split("/").filter(Boolean);
  // legacy v1 routes
  if (seg[0] === "code") return { seg: ["a", "cc"], q: new URLSearchParams(qs || "") };
  if (seg[0] === "more") return { seg: ["settings"], q: new URLSearchParams(qs || "") };
  if (seg[0] === "ch" && seg.length === 2 && /^ch\d+$/.test(seg[1])) seg = ["ch", "cc", seg[1]];
  if (seg[0] === "s" && seg.length === 2 && /^(cc|ca|cca|sch)-/.test(seg[1])) seg = ["s", "cc", seg[1]];
  return { seg, q: new URLSearchParams(qs || "") };
}
window.addEventListener("hashchange", render);

/* ---------- view scaffolding ---------- */
const views = {};
function viewRoot(name){
  let v = views[name];
  if (!v) { v = el("section", { class:"view", id:"view-" + name }); $("#main").appendChild(v); views[name] = v; }
  return v;
}
function activate(name, tab){
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  viewRoot(name).classList.add("active");
  document.querySelectorAll("[data-tab]").forEach(b => {
    const on = b.dataset.tab === tab;
    b.classList.toggle("active", on);
    if (on) b.setAttribute("aria-current", "page"); else b.removeAttribute("aria-current");
  });
}
function topbar(opts){
  const tb = el("div", { class:"topbar" });
  if (opts.back !== false) {
    const b = el("button", { class:"back-btn", "aria-label":"Back", onclick:() => { Haptics.tap(); if (history.length > 1) history.back(); else go(opts.fallback || "/home"); } });
    b.innerHTML = I.back + "<span>" + esc(opts.backLabel || "Back") + "</span>";
    tb.appendChild(b);
  }
  tb.appendChild(el("div", { class:"tb-title" }, esc(opts.title || "")));
  if (opts.right) tb.appendChild(opts.right); else tb.appendChild(el("span", { style:"width:42px;flex:none" }));
  requestAnimationFrame(() => {
    const onScroll = () => tb.classList.toggle("stuck", window.scrollY > 36);
    window.addEventListener("scroll", onScroll, { passive:true }); onScroll();
  });
  return tb;
}
function searchField(ph, opts){
  const f = el("div", { class:"field", role:"search" });
  f.innerHTML = I.search;
  const inp = el("input", { type:"search", placeholder:ph, autocomplete:"off", autocorrect:"off",
    spellcheck:"false", "aria-label":ph, enterkeyhint:"search" });
  f.appendChild(inp);
  const clr = el("button", { class:"clear", "aria-label":"Clear search", onclick:() => { inp.value = ""; f.classList.remove("has-q"); inp.focus(); if (opts.live) opts.live(""); } });
  clr.innerHTML = I.x; f.appendChild(clr);
  inp.addEventListener("input", () => { f.classList.toggle("has-q", !!inp.value); if (opts.live) opts.live(inp.value); });
  inp.addEventListener("keydown", e => {
    if (e.key === "Enter" && opts.enter) { e.preventDefault(); opts.enter(inp.value); }
    if (e.key === "Escape") {
      e.stopPropagation();
      if (inp.value) { inp.value = ""; f.classList.remove("has-q"); if (opts.live) opts.live(""); }
      else { inp.blur(); if (history.length > 1) history.back(); }
    }
  });
  if (opts.focusgo) inp.addEventListener("focus", () => opts.focusgo(inp.value));
  return f;
}
function skeletonView(v){
  v.innerHTML = "";
  v.appendChild(el("div", { class:"skel", style:"height:34px;width:55%;margin:26px 2px 14px" }));
  v.appendChild(el("div", { class:"skel", style:"height:48px;margin:10px 0" }));
  for (let i = 0; i < 4; i++) v.appendChild(el("div", { class:"skel", style:"height:72px;margin:10px 0" }));
}
function withAct(actId, name, fn){
  const a = regById.get(actId);
  if (!a) { go("/home", true); return; }
  if (ACTS.has(actId)) { fn(ACTS.get(actId)); return; }
  const v = viewRoot(name); skeletonView(v); activate(name, "lib");
  ensureAct(actId).then(d => {
    const { seg } = parseHash();
    fn(d);
  }).catch(() => {
    const v2 = viewRoot(name); v2.innerHTML = "";
    v2.appendChild(topbar({ title:a.short, fallback:"/home" }));
    const em = el("div", { class:"empty" }, `${I.alert}<p>Couldn't load ${esc(a.short)}.</p><p>Check your connection and try again.</p>`);
    const rt = el("button", { class:"copybtn", style:"margin:10px auto;display:inline-flex", onclick:() => render() }, "Retry");
    em.appendChild(rt); v2.appendChild(em);
  });
}

/* ---------- shared rows ---------- */
function secRow(act, s, sub){
  const r = el("button", { class:"row res-row", onclick:() => { Haptics.tap(); go(`/s/${act.meta.id}/${s.id}`); } });
  r.innerHTML = `<span class="badge" style="--hue:${groupHue(act, s.grp)}">${esc(s.num)}</span>
    <span class="r-main"><span class="r-title">${esc(s.t)}</span>${sub ? `<span class="r-sub">${sub}</span>` : ""}</span>
    <span class="chev">${I.chev}</span>`;
  return r;
}
function actRow(a, sub){
  const r = el("button", { class:"row", onclick:() => { Haptics.tap(); go(`/a/${a.id}`); } });
  r.innerHTML = `<span class="badge act-badge" style="--hue:${a.color}">${esc(a.abbr)}</span>
    <span class="r-main"><span class="r-title">${esc(a.short)}</span>
    <span class="r-sub">${sub || esc(`${a.n} provisions · as at ${a.compilation || "—"}`)}</span></span>
    <span class="chev">${I.chev}</span>`;
  return r;
}
function chapterSub(act, s){
  const c = s.ch && act.chById.get(s.ch);
  if (c) return `${c.label} — ${c.title}`;
  const g = act.grpById.get(s.grp);
  return g ? (g.kind === "body" ? act.meta.short : `${g.label} — ${g.title}`) : "";
}
function chipBtn(label, fn, hue){
  return el("button", { class:"chip", style:`--hue:${hue}`, onclick:() => { Haptics.tap(); fn(); } }, esc(label));
}

/* ---------- HOME ---------- */
function renderHome(){
  const v = viewRoot("home"); v.innerHTML = "";
  const bb = el("div", { class:"brandbar" });
  bb.innerHTML = `<div class="mark" aria-hidden="true">§</div><div><span class="t">Legislation</span><span class="s">Western Australia</span></div>`;
  const gear = el("button", { class:"icon-btn gear", "aria-label":"Settings", onclick:() => { Haptics.tap(); go("/settings"); } });
  gear.innerHTML = I.gear; bb.appendChild(gear);
  v.appendChild(bb);

  const hero = el("div", { class:"home-hero" });
  const f = searchField("Search 23 Acts — section number or words…", {
    focusgo: q => go("/search" + (q ? "?q=" + encodeURIComponent(q) : "")),
  });
  f.style.margin = "16px 0 4px";
  f.appendChild(el("span", { class:"kbd-in", "aria-hidden":"true" }, "⌘K"));
  hero.appendChild(f);
  v.appendChild(hero);

  // hydration pill (only if still loading after a beat)
  if (!allLoaded()) {
    const pill = el("div", { class:"loadpill hide", role:"status" });
    pill.innerHTML = `<span class="spin" aria-hidden="true"></span><span class="lp-t">Preparing library…</span>`;
    v.appendChild(pill);
    const t = setTimeout(() => pill.classList.remove("hide"), 500);
    const upd = () => {
      pill.querySelector(".lp-t").textContent = `Preparing library — ${loadedCount} of ${REG.length} Acts`;
      if (allLoaded()) { clearTimeout(t); pill.remove(); document.removeEventListener("act:loaded", upd); }
    };
    document.addEventListener("act:loaded", upd); upd();
  }

  // continue reading
  if (recents.length) {
    const r0 = recents[0];
    const a = regById.get(r0.a);
    if (a) {
      v.appendChild(el("p", { class:"sec-label" }, "Continue"));
      const card = el("div", { class:"card list" });
      const row = el("button", { class:"row", onclick:() => { Haptics.tap(); go(`/s/${r0.a}/${r0.s}`); } });
      row.innerHTML = `<span class="badge act-badge" style="--hue:${a.color}">${esc(a.abbr)}</span>
        <span class="r-main"><span class="r-title rec-t">…</span><span class="r-sub">${esc(a.short)}</span></span><span class="chev">${I.chev}</span>`;
      card.appendChild(row); v.appendChild(card);
      ensureAct(r0.a).then(d => {
        const s = d.byId.get(r0.s);
        if (s) row.querySelector(".rec-t").textContent = `${secLabel(s)} — ${s.t}`;
        else card.remove();
      }).catch(() => {});
    }
  }

  // quick jump
  const ql = el("p", { class:"sec-label" }, "Quick jump");
  ql.appendChild(el("button", { class:"more-link", onclick:() => { Haptics.tap(); go("/topics"); } }, "All topics"));
  v.appendChild(ql);
  const tiles = el("div", { class:"tiles" });
  const heroes = TOPICS.filter(t => t.hero);
  heroes.filter(t => WIDE.has(t.id)).forEach(t => tiles.appendChild(topicTile(t, true)));
  heroes.filter(t => !WIDE.has(t.id)).forEach(t => tiles.appendChild(topicTile(t)));
  v.appendChild(tiles);

  // library
  const ll = el("p", { class:"sec-label" }, "Library");
  ll.appendChild(el("button", { class:"more-link", onclick:() => { Haptics.tap(); go("/acts"); } }, `All ${REG.length} Acts`));
  v.appendChild(ll);
  const lc = el("div", { class:"card list acts-card" });
  PRIORITY.filter(id => !isDoc(regById.get(id))).slice(0, 6).forEach(id => lc.appendChild(actRow(regById.get(id))));
  v.appendChild(lc);

  v.appendChild(el("p", { class:"sec-foot", style:"justify-content:center;margin-top:26px" },
    `23 Acts · verbatim text · built ${esc(BOOT.built)}`));
}

/* ---------- ACT BROWSE ---------- */
function renderAct(actId, q){
  withAct(actId, "act", act => {
    const m = act.meta;
    const v = viewRoot("act"); v.innerHTML = "";
    v.setAttribute("style", famVars(m.fam || "blue")); v.classList.add("tinted");
    v.appendChild(topbar({ title:m.short, backLabel:"Library", fallback:"/acts" }));
    const head = el("header", { class:"lg-head" });
    head.appendChild(el("p", { class:"eyebrow", style:`color:color-mix(in srgb, ${m.color} 55%, var(--text) 45%)` }, esc(`${m.abbr} · Western Australia`)));
    head.appendChild(el("h1", { style:"font-size:1.75em" }, esc(m.name)));
    head.appendChild(el("p", { class:"sub" }, esc(isRef(m) ? `${m.nd} documents · ${m.n.toLocaleString()} entries` : `As at ${m.compilation || "—"} · ${m.n.toLocaleString()} ${isDoc(m) ? "entries" : "provisions"}${m.src === "page-archive" ? " · rebuilt from page scans" : ""}`)));
    v.appendChild(head);

    const f = searchField(`Search ${m.abbr}… try a section number`, {
      focusgo: qq => go(`/search?in=${m.id}` + (qq ? "&q=" + encodeURIComponent(qq) : "")),
    });
    v.appendChild(f);

    const openKey = "open:" + m.id;
    const open = new Set(store.get(openKey, [act.tree[0] && act.tree[0].id].filter(Boolean)));
    act.tree.forEach(g => {
      const hue = groupHue(act, g.id);
      const card = el("div", { class:"card part-card", style:`--hue:${hue}`, id:"grp-" + g.id });
      const secs = g.items.filter(i => i.k === "sec");
      const chs = g.items.filter(i => i.k === "ch");
      const meta = (g.sub ? g.sub + " · " : "") + (chs.length ? `${chs.length} chapters · ` : "") + `${secs.length || countChSecs(act, chs)} ${isDoc(act.meta) ? (secs.length === 1 ? "entry" : "entries") : (secs.length === 1 ? "provision" : "provisions")}`;
      const h = el("button", { class:"part-head", "aria-expanded": open.has(g.id) ? "true" : "false", onclick:() => {
        Haptics.tap();
        const isOpen = card.classList.toggle("open");
        h.setAttribute("aria-expanded", isOpen ? "true" : "false");
        if (isOpen && !body.dataset.built) buildBody();
        const cur = new Set(store.get(openKey, []));
        if (isOpen) cur.add(g.id); else cur.delete(g.id);
        store.set(openKey, [...cur]);
      }});
      h.innerHTML = `<span class="part-dot"></span>
        <span class="r-main"><span class="part-label">${esc(g.label)}</span><br><span class="part-title">${esc(g.title)}</span>
        <span class="part-meta">${esc(meta)}</span></span>
        <span class="part-chev">${I.chev}</span>`;
      card.appendChild(h);
      const tset = new Map();
      const addT = sid => (act.inTopics.get(sid) || []).forEach(tid2 => tset.set(tid2, (tset.get(tid2) || 0) + 1));
      g.items.forEach(it => {
        if (it.k === "sec") addT(it.id);
        else if (it.k === "ch") (act.secsOfCh.get(it.id) || []).forEach(s2 => addT(s2.id));
      });
      const tickNames = [];
      g.items.forEach(it => {
        if (it.k === "sec") { const s2 = act.byId.get(it.id); if (s2 && !s2.dt) tickNames.push({ t: s2.t, id: s2.id }); }
        else if (it.k === "ch") (act.secsOfCh.get(it.id) || []).forEach(s2 => { if (!s2.dt) tickNames.push({ t: s2.t, id: s2.id }); });
      });
      if (tickNames.length > 3) {
        const tk = el("div", { class:"ticker", role:"list", "aria-label":"Provisions in this group" });
        tickNames.slice(0, 14).forEach(n => {
          const b = el("button", { class:"tk", role:"listitem", onclick:(e) => { e.stopPropagation(); Haptics.tap(); go(`/s/${m.id}/${n.id}`); } }, esc(n.t.length > 44 ? n.t.slice(0, 43) + "…" : n.t));
          tk.appendChild(b);
        });
        card.appendChild(tk);
      }
      if (tset.size) {
        const row = el("div", { class:"grp-topics" });
        [...tset.entries()].sort((a, b) => b[1] - a[1]).slice(0, 4).forEach(([tid2]) => {
          const tp = topicById.get(tid2); if (!tp) return;
          const chip = el("button", { class:"gt-chip", "aria-label":"Topic: " + tp.name, onclick:(e) => { e.stopPropagation(); Haptics.tap(); go("/t/" + tid2); } });
          chip.innerHTML = `${topicIcon(tp.icon)}<span>${esc(tp.name)}</span>`;
          row.appendChild(chip);
        });
        card.appendChild(row);
      }
      const body = el("div", { class:"part-body" });
      const inner = el("div");
      body.appendChild(inner); card.appendChild(body);
      const buildBody = () => {
        body.dataset.built = "1";
        g.items.forEach(it => {
          if (it.k === "lbl") inner.appendChild(el("div", { class:"div-label" }, esc(it.t)));
          else if (it.k === "ch") {
            const c = act.chById.get(it.id);
            const list = act.secsOfCh.get(c.id) || [];
            const range = !list.length ? "" : list.length === 1 ? `s ${list[0].num}` : `s ${list[0].num}–${list[list.length - 1].num}`;
            const r = el("button", { class:"row", onclick:() => { Haptics.tap(); go(`/ch/${m.id}/${c.id}`); } });
            r.innerHTML = `<span class="badge" style="--hue:${hue}">${esc(c.label.replace("Chapter ", ""))}</span>
              <span class="r-main"><span class="r-title">${esc(c.title)}</span><span class="r-sub">${esc(c.label)} · ${range}</span></span>
              <span class="chev">${I.chev}</span>`;
            inner.appendChild(r);
          } else {
            const s = act.byId.get(it.id);
            if (s) inner.appendChild(secRow(act, s));
          }
        });
      };
      if (open.has(g.id)) { buildBody(); card.classList.add("open"); }
      v.appendChild(card);
    });
    v.appendChild(el("p", { class:"sec-foot", style:"justify-content:center;margin-top:26px" },
      `${esc(m.name)}${m.pco ? " · " + esc(m.pco) : ""}`));

    // ---- scrollspy rail (wide screens): what's where as you scroll ----
    if (act.tree.length > 1) {
      const spy = el("nav", { class:"spy", "aria-label":"Contents in view" });
      spy.appendChild(el("p", { class:"spy-head" }, "On this page"));
      const rows = new Map();
      act.tree.forEach(g => {
        const hue = groupHue(act, g.id);
        const names = [];
        g.items.forEach(it => {
          if (names.length >= 4) return;
          if (it.k === "sec") { const s2 = act.byId.get(it.id); if (s2 && !s2.dt) names.push(s2.t); }
          else if (it.k === "ch") { const c2 = act.chById.get(it.id); if (c2) names.push(c2.title); }
        });
        const row = el("button", { class:"spy-g", style:`--hue:${hue}`, onclick:() => {
          Haptics.tap();
          const card = v.querySelector("#grp-" + CSS.escape(g.id));
          if (card) { if (!card.classList.contains("open")) card.querySelector(".part-head")?.click(); card.scrollIntoView({ behavior:"smooth", block:"start" }); }
        }});
        row.innerHTML = `<span class="spy-bar" aria-hidden="true"></span><span class="spy-main"><span class="spy-lab">${esc(g.label)}</span>` +
          (names.length ? `<span class="spy-names">${esc(names.map(n => n.length > 30 ? n.slice(0, 29) + "…" : n).join(" · "))}</span>` : "") + `</span>`;
        spy.appendChild(row);
        rows.set("grp-" + g.id, row);
      });
      v.appendChild(spy);
      const io = new IntersectionObserver(entries => {
        entries.forEach(en => {
          const row = rows.get(en.target.id);
          if (row) row.classList.toggle("near", en.isIntersecting);
        });
        const first = [...rows.entries()].find(([id, r]) => r.classList.contains("near"));
        rows.forEach(r => r.classList.remove("on"));
        if (first) { first[1].classList.add("on"); first[1].scrollIntoView({ block:"nearest" }); }
      }, { rootMargin: "-72px 0px -55% 0px" });
      v.querySelectorAll(".part-card").forEach(c => io.observe(c));
    }

    // deep link: open + scroll to group
    const gTarget = q && q.get("g");
    if (gTarget) {
      const card = v.querySelector("#grp-" + CSS.escape(gTarget));
      if (card) {
        if (!card.classList.contains("open")) card.querySelector(".part-head").click();
        requestAnimationFrame(() => card.scrollIntoView({ block:"start", behavior:"auto" }));
      }
    }
  });
}
function countChSecs(act, chs){
  return chs.reduce((n, it) => n + (act.secsOfCh.get(it.id) || []).length, 0);
}

/* ---------- CHAPTER (CC) ---------- */
function renderChapter(actId, chId){
  withAct(actId, "chapter", act => {
    const c = act.chById.get(chId); if (!c) return go("/a/" + actId, true);
    const hue = groupHue(act, c.grp);
    const v = viewRoot("chapter"); v.innerHTML = "";
    v.setAttribute("style", famVars(act.meta.fam || "blue")); v.classList.add("tinted");
    v.appendChild(topbar({ title:c.label, backLabel:act.meta.abbr, fallback:"/a/" + actId }));
    const g = act.grpById.get(c.grp);
    const head = el("header", { class:"lg-head", style:`--hue:${hue}` });
    head.appendChild(el("p", { class:"eyebrow", style:"color:color-mix(in srgb, var(--hue) 55%, var(--text) 45%)" }, esc(`${g ? g.label + " · " : ""}${c.label}`)));
    head.appendChild(el("h1", { style:"font-size:1.65em" }, esc(c.title)));
    if (c.sub) head.appendChild(el("p", { class:"sub" }, esc(c.sub)));
    if (c.division) head.appendChild(el("p", { class:"sub" }, esc(c.division)));
    v.appendChild(head);
    const card = el("div", { class:"card list", style:"margin-top:10px" });
    (act.secsOfCh.get(chId) || []).forEach(s => card.appendChild(secRow(act, s)));
    v.appendChild(card);
    const idx = act.chapters.findIndex(x => x.id === chId);
    const bar = el("div", { class:"pn-bar" });
    if (idx > 0) bar.appendChild(pnBtn("Previous", act.chapters[idx-1].title, () => go(`/ch/${actId}/${act.chapters[idx-1].id}`), false));
    if (idx < act.chapters.length - 1) bar.appendChild(pnBtn("Next", act.chapters[idx+1].title, () => go(`/ch/${actId}/${act.chapters[idx+1].id}`), true));
    v.appendChild(bar);
  });

function pnBtn(dir, label, fn, next){

/* ---------- WAPF style-guide citations ---------- */
function bareName(m){ return m.name.replace(/^The\s+/, ""); }
function citeOf(act, s){
  const m = act.meta || act;
  if (isRef(m)) {
    const g = (act.tree || []).find(x => x.id === s.grp);
    const doc = g ? g.label : m.name;
    const ver = g && g.sub ? " (" + g.sub + ")" : "";
    return { plain: `“${s.t}” — ${doc}${ver}`, html: `“${esc(s.t)}” — <em>${esc(doc)}</em>${esc(ver)}` };
  }
  if (isDoc(m)) return { plain: `“${s.t}” — ${m.name}${m.compilation ? " (" + m.compilation + ")" : ""}`,
                         html: `“${esc(s.t)}” — <em>${esc(m.name)}</em>` };
  const u = s.unit === "cl" ? "cl." : s.unit === "r" ? "r." : s.unit === "item" ? "item" : s.unit === "sch" ? "Sch." : "s.";
  const cth = jur(m.id) === "Cth" ? " (Cth)" : "";
  if (s.unit === "fm") return { plain: `the ${bareName(m)}${cth}`, html: `the <em>${esc(bareName(m))}</em>${cth}` };
  const t = s.dt ? "" : s.t + " ";
  return { plain: `${t}${u} ${s.num} of the ${bareName(m)}${cth}`,
           html: `${esc(t)}${u} ${esc(s.num)} of the <em>${esc(bareName(m))}</em>${cth}` };
}

/* ---------- copy section (rich + plain) ---------- */
async function copyRich(html, text){
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      await navigator.clipboard.write([new ClipboardItem({
        "text/html": new Blob([html], { type:"text/html" }),
        "text/plain": new Blob([text], { type:"text/plain" })
      })]);
      return true;
    }
  } catch(e){}
  try { await navigator.clipboard.writeText(text); return true; } catch(e){ return false; }
}
function sectionFormats(act, s){
  const m = act.meta;
  const title = s.unit === "fm" ? s.t : `${s.num}.  ${s.t}`;
  const H = [`<p style="margin:0 0 10px 0"><strong>${esc(title)}</strong></p>`];
  const L = [title, ""];
  const wrap = document.createElement("div");
  wrap.innerHTML = s.h;
  const pushItem = (node, base) => {
    const lvl = node.classList.contains("l3") ? 3 : node.classList.contains("l2") ? 2 : 1;
    const mk = (node.querySelector(".mk") || {}).textContent || "";
    const tx = (node.querySelector(".tx") || {}).textContent || "";
    H.push(`<p style="margin:2px 0 2px ${(base + lvl - 1) * 26}px"><span>${esc(mk)}</span>&nbsp;&nbsp;${esc(tx)}</p>`);
    L.push("\t".repeat(base + lvl - 1) + mk + "\t" + tx);
  };
  for (const n of wrap.children) {
    if (n.classList.contains("it")) pushItem(n, 0);
    else if (n.classList.contains("callout")) {
      for (const c of n.children) {
        if (c.classList.contains("co-head")) {
          const lab = (c.querySelector(".co-label") || {}).textContent || "";
          const rest = c.textContent.replace(lab, "").trim();
          H.push(`<p style="margin:8px 0 2px 0"><strong>${esc(lab)}</strong> ${esc(rest)}</p>`);
          L.push(lab + (rest ? " " + rest : ""));
        } else if (c.classList.contains("it")) pushItem(c, 1);
      }
    }
    else if (n.classList.contains("altrow")) { const txt = n.textContent.trim(); H.push(`<p style="margin:8px 0 0 0"><em>${esc(txt)}</em></p>`); L.push(txt); }
    else if (n.tagName === "PRE") { H.push(`<pre style="font-family:inherit;white-space:pre-wrap">${esc(n.textContent)}</pre>`); L.push(n.textContent); }
    else { const txt = n.textContent.trim(); if (txt) { H.push(`<p style="margin:6px 0">${esc(txt)}</p>`); L.push(txt); } }
  }
  const c0 = citeOf({ meta: m }, s);
  const src = `${c0.plain}${m.compilation && !isDoc(m) ? ` — as at ${m.compilation}` : ""}`;
  H.push(`<p style="margin:12px 0 0 0;color:#666;font-size:90%">${esc(src)}</p>`);
  L.push("", "— " + src);
  return { html: `<div style="font-family:Georgia, 'Times New Roman', serif; line-height:1.5">${H.join("")}</div>`, text: L.join("\n") };
}

  if (m) {
    const act = REG.find(a => a.id === m[1] || a.aliases.includes(m[1]) || a.abbr.toLowerCase() === m[1]);

        x.innerHTML = I.x;
        c.appendChild(x);
        wrap.appendChild(c);
      });
      out.appendChild(wrap);
    }
    out.appendChild(el("p", { class:"res-group-label" }, "Try"));
    const sug = el("div", { class:"qchips" });
    ["392", "cia 128", "self-defence", "circumstances of aggravation", "drug trafficking", "move on order"].forEach(qq => {
      const c = el("button", { class:"qchip sug", onclick:() => { Haptics.tap(); runQ(qq); } }, esc(qq));
      sug.appendChild(c);
    });
    out.appendChild(sug);
    if (recents.length) {
      out.appendChild(el("p", { class:"res-group-label" }, "Recently viewed"));
      const card = el("div", { class:"card list" });
      recents.slice(0, 6).forEach(r => {
        const act = ACTS.get(r.a);
        if (act) { const s = act.byId.get(r.s); if (s) card.appendChild(searchRow(act, s, [], "")); }
      });
      if (card.children.length) out.appendChild(card);
    }
    notLoadedNote(out, effScope);
    return;
  }
  
  const ql = q.toLowerCase();
  const tokens = ql.split(/\s+/).filter(Boolean);
  const numQ = /^\d+[a-zA-Z]{0,3}$/.test(ql);
  const acts = loadedActs(effScope);
  const curActId = routeActId();
  const results = [];
  if (numQ) {
    const up = ql.toUpperCase();
    const ordered = [...acts].sort((a, b) => actRank(b, curActId) - actRank(a, curActId));
    ordered.forEach(act => {
      const s = act.byNum.get(up);
      if (s) results.push({ act, s, go:true });
    });
    ordered.forEach(act => {
      act.sections.forEach(s => {
        const nl = s.num.toLowerCase();
        if (nl !== ql && nl.startsWith(ql) && (s.unit === "s" || s.unit === "r"))
          results.push({ act, s, score: 40 + actRank(act, curActId) - (nl.length - ql.length) });
      });
    });
  }
  if (!numQ) {
    acts.forEach(act => {
      const rank = actRank(act, curActId);
      act.sections.forEach(s => {
        let score = 0;
        if (s.tl === ql) score += 95;
        else if (s.tl.includes(ql)) score += 55 + (s.tl.startsWith(ql) ? 6 : 0);
        const inTitle = tokens.filter(t => s.tl.includes(t)).length;
        if (inTitle === tokens.length && tokens.length > 1) score += 30 + inTitle * 3;
        if (score > 0) { results.push({ act, s, score: score + rank * 2.2 }); }
      });
    });
  }
  renderResults(out, results, tokens, ql, q, numQ, effScope, false);
  const single = effScope !== "all";
  // phase 2: bodies (keyword queries only)
  if (!numQ && ql.length > 2) {
    const note = el("p", { class:"search-note" }, `<span class="spin" style="width:11px;height:11px;border-width:1.5px" aria-hidden="true"></span> Searching full text…`);
    note.classList.add("loadpill"); note.style.margin = "10px 2px";
    out.appendChild(note);
    const seen = new Set(results.map(r => r.act.meta.id + "/" + r.s.id));
    const queue = [...acts];
    const bodyResults = [];
    const step = () => {
      if (gen !== searchGen) return;
      const t0 = performance.now();
      while (queue.length && performance.now() - t0 < 12) {
        const act = queue.shift();
        const rank = actRank(act, routeActId());
        act.sections.forEach(s => {
          if (seen.has(act.meta.id + "/" + s.id)) return;
          let score = 0;
          if (s.x.includes(ql)) score += 22;
          else if (tokens.length > 1 && tokens.every(t => s.x.includes(t))) score += 12;
          if (score > 0) bodyResults.push({ act, s, score: score + rank * 2.2 });
        });
      }
      if (queue.length) { setTimeout(step, 0); return; }
      if (gen !== searchGen) return;
      note.remove();
      renderResults(out, results.concat(bodyResults), tokens, ql, q, numQ, effScope, true);
    };
    setTimeout(step, 0);
  } else {
    notLoadedNote(out, effScope);
  }
}
function actRank(act, curActId){
  return act.meta.pr + (act.meta.id === curActId ? 5 : 0);
}
function routeActId(){
  const { seg } = parseHash();
  if ((seg[0] === "a" || seg[0] === "s" || seg[0] === "ch") && seg[1] && regById.has(seg[1])) return seg[1];
  const r = recents[0];
  return r ? r.a : "cc";
}
function renderResults(out, results, tokens, ql, q, numQ, scope, final){
  const single = scope !== "all";
  out.innerHTML = "";
  if (!results.length) {
    if (final || numQ) out.appendChild(el("div", { class:"empty" }, `${I.search}<p>No matches for “${esc(q)}”.</p><p>Try the section number or a shorter word.</p>`));
    notLoadedNote(out, scope);
    return;
  }
  const gos = results.filter(r => r.go);
  if (gos.length) {
    out.appendChild(el("p", { class:"res-group-label" }, "Go to"));
    const card = el("div", { class:"card list" });
    gos.forEach(r => card.appendChild(searchRow(r.act, r.s, tokens, ql, true, single)));
    out.appendChild(card);
  }
  const rest = results.filter(r => !r.go).sort((a, b) => b.score - a.score ||
    (a.act.orderIdx.get(a.s.id) - b.act.orderIdx.get(b.s.id))).slice(0, 60);
  if (rest.length) {
    out.appendChild(el("p", { class:"res-group-label" }, gos.length ? "Matches" : `${rest.length}${rest.length === 60 ? "+" : ""} matches`));
    const card = el("div", { class:"card list" });
    rest.forEach(r => card.appendChild(searchRow(r.act, r.s, tokens, ql, false, single)));
    out.appendChild(card);
  }
  notLoadedNote(out, scope);
}
function notLoadedNote(out, scope){
  if (allLoaded()) return;
  const n = REG.length - loadedCount;
  out.appendChild(el("p", { class:"search-note" }, `Still preparing ${n} Act${n > 1 ? "s" : ""} — results will refresh.`));
}
function searchRow(act, s, tokens, ql, isGo, single){
  const row = el("button", { class:"row res-row" + (isGo ? " go-row" : ""), onclick:() => {
    Haptics.tap();
    const inp = document.querySelector("#view-search input");
    if (inp && viewRoot("search").classList.contains("active")) rememberQuery(inp.value);
    go(`/s/${act.meta.id}/${s.id}`);
  } });
  const title = isGo ? `${secLabel(s)} — ${s.t}` : s.t;
  const badge = `<span class="badge act-badge" style="--hue:${act.meta.color}">${esc(act.meta.abbr)}</span>`;
  const numBadge = `<span class="badge" style="--hue:${groupHue(act, s.grp)}">${esc(s.num)}</span>`;
  row.innerHTML = `${single && !isGo ? numBadge : badge}
    <span class="r-main"><span class="r-title">${markup(title, tokens)}</span>
    <span class="r-sub">${isGo ? esc(act.meta.short) : snippet(act, s, tokens, ql, single)}</span></span><span class="chev">${I.chev}</span>`;
  return row;
}
function markup(text, tokens){
  let safe = esc(text);
  tokens.forEach(t => {
    if (t.length < 2) return;
    safe = safe.replace(new RegExp("(" + t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig"), "<b>$1</b>");
  });
  return safe;
}
function snippet(act, s, tokens, ql, single){
  const pre = single ? esc(secLabel(s)) : esc(`${act.meta.abbr} ${secLabel(s)}`);
  let pos = ql ? s.x.indexOf(ql) : -1;
  if (pos < 0) for (const t of tokens) { pos = s.x.indexOf(t); if (pos >= 0) break; }
  if (pos < 0) return `<b style="font-weight:650">${pre}</b> · ${esc(chapterSub(act, s))}`;
  const start = Math.max(0, pos - 36);
  let frag = s.b.slice(start, pos + 90);
  if (start > 0) frag = "…" + frag.slice(frag.indexOf(" ") + 1);
  let safe = esc(frag);
  tokens.forEach(t => {
    if (t.length < 2) return;
    safe = safe.replace(new RegExp("(" + t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig"), "<mark>$1</mark>");
  });
  return `<b style="font-weight:650">${pre}</b> · ${safe}`;
}

/* ---------- highlight-to-copy with citation ---------- */
let selPill = null, selTimer = null;
function subPath(node){
  let el2 = node.nodeType === 1 ? node : node.parentElement;
  const item = el2 && el2.closest ? el2.closest(".it") : null;
  if (!item) {
    const co = el2 && el2.closest ? el2.closest(".callout") : null;
    return co ? " (penalty)" : "";
  }
  const lvlOf = x => x.classList.contains("l3") ? 3 : x.classList.contains("l2") ? 2 : 1;
  const mkOf = x => { const mk = x.querySelector(".mk"); return mk ? mk.textContent.trim() : ""; };
  let path = [mkOf(item)];
  let lvl = lvlOf(item), cur = item;
  while (lvl > 1 && cur) {
    cur = cur.previousElementSibling;
    if (cur && cur.classList && cur.classList.contains("it") && lvlOf(cur) < lvl) {
      path.unshift(mkOf(cur)); lvl = lvlOf(cur);
    }
  }
  return path.join("");
}
function hideSelPill(){ if (selPill) { selPill.remove(); selPill = null; } }

      const range = sel.getRangeAt(0);
      const host = range.commonAncestorContainer.nodeType === 1 ? range.commonAncestorContainer : range.commonAncestorContainer.parentElement;
      const stat = host && host.closest ? host.closest(".statute") : null;
      if (!stat) { hideSelPill(); return; }
      const { seg } = parseHash();
      if (seg[0] !== "s" || !ACTS.has(seg[1])) { hideSelPill(); return; }
      const act = ACTS.get(seg[1]); const s = act.byId.get(seg[2]);
      if (!s) { hideSelPill(); return; }
      const text = sel.toString().replace(/\s+/g, " ").trim();
      if (text.length < 3) { hideSelPill(); return; }
      const rect = range.getBoundingClientRect();
      hideSelPill();
      selPill = el("button", { class:"sel-pill", "aria-label":"Copy selection with citation", onclick:async () => {
        Haptics.tap();
        const path = subPath(range.startContainer);
        let plainCite, htmlCite;
        if (isDoc(act.meta) || s.unit === "fm") {
          const c = citeOf(act, s);
          plainCite = c.plain; htmlCite = c.html;
        } else {
          const u = s.unit === "cl" ? "cl." : s.unit === "r" ? "r." : s.unit === "item" ? "item" : s.unit === "sch" ? "Sch." : "s.";
          const sub = path && path.startsWith("(") ? path : "";
          const penNote = path === " (penalty)" ? " (penalty)" : "";
          const t2 = s.dt ? "" : s.t + " ";
          const cth = jur(act.meta.id) === "Cth" ? " (Cth)" : "";
          plainCite = `${t2}${u} ${s.num}${sub} of the ${bareName(act.meta)}${cth}${penNote}`;
          htmlCite = `${esc(t2)}${u} ${esc(s.num + sub)} of the <em>${esc(bareName(act.meta))}</em>${cth}${penNote}`;
        }
        const plain = `\u201C${text}\u201D \u2014 ${plainCite}`;
        const html = `<span>\u201C${esc(text)}\u201D \u2014 ${htmlCite}</span>`;
        const ok2 = await copyRich(html, plain);
        if (ok2) { selPill.textContent = "Copied \u2713"; setTimeout(hideSelPill, 900); }
      }});
      selPill.innerHTML = I.copy + "<span>Copy + cite</span>";
      document.body.appendChild(selPill);
      const top = Math.max(8, rect.top - 46);
      const left = Math.min(window.innerWidth - 150, Math.max(8, rect.left + rect.width / 2 - 70));
      selPill.style.top = top + "px"; selPill.style.left = left + "px";
    }, 260);
  });
  window.addEventListener("scroll", hideSelPill, { passive: true });
  window.addEventListener("hashchange", hideSelPill);
}

/* ---------- quiz engine (verbatim-derived; every answer checkable) ---------- */
const PEN_TXT = h => { const m = /<div class="callout (?:pen|sum)"><p class="co-head"><span class="co-label">([^<]*)<\/span>\s*([\s\S]*?)<\/p>/.exec(h); return m ? (m[1] + " " + m[2].replace(/<[^>]+>/g, "")).replace(/\s+/g, " ").trim() : null; };
const shuffle = a => { a = [...a]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
function quizPool(act, s){
  const sibs = act.sections.filter(x => x.id !== s.id && (x.unit === "s" || x.unit === "r") && !x.dt);
  const near = sibs.filter(x => x.grp === s.grp);
  return { sibs, near: near.length >= 3 ? near : sibs };
}
function makeQuestion(act, s){
  const m = act.meta;
  const { sibs, near } = quizPool(act, s);
  const types = [];
  if (sibs.length >= 3) types.push("numTitle", "titleNum");
  const pen = PEN_TXT(s.h);
  if (pen) {
    const penPool = [...new Set(sibs.map(x => PEN_TXT(x.h)).filter(p => p && p !== pen))];
    if (penPool.length >= 3) types.push("pen", "pen");
  }
  if (s.alt) {
    const altNums = (s.alt.match(/\d+[A-Z]{0,2}/g) || []).filter(n => act.byNum.has(n.toUpperCase()));
    if (altNums.length) types.push("alt");
  }
  if (!types.length) return null;
  const type = types[Math.floor(Math.random() * types.length)];
  if (type === "numTitle") {
    const opts = shuffle([s, ...shuffle(near).slice(0, 3)]);
    return { q: `${m.abbr} ${secLabel(s)} is…`, opts: opts.map(x => x.t), correct: opts.findIndex(x => x.id === s.id), why: `${secLabel(s)} — ${s.t}` };
  }
  if (type === "titleNum") {
    const opts = shuffle([s, ...shuffle(near).slice(0, 3)]);
    return { q: `“${s.t}” is which provision of the ${m.short}?`, opts: opts.map(x => secLabel(x)), correct: opts.findIndex(x => x.id === s.id), why: `${secLabel(s)} — ${s.t}` };
  }
  if (type === "pen") {
    const penPool = shuffle([...new Set(sibs.map(x => PEN_TXT(x.h)).filter(p => p && p !== pen))]).slice(0, 3);
    const opts = shuffle([pen, ...penPool]);
    return { q: `Which penalty line appears in ${m.abbr} ${secLabel(s)} (${s.t})?`, opts, correct: opts.indexOf(pen), why: "Quoted verbatim from the section." };
  }
  // alt
  const altNums = (s.alt.match(/\d+[A-Z]{0,2}/g) || []).filter(n => act.byNum.has(n.toUpperCase()));
  const correctNum = altNums[Math.floor(Math.random() * altNums.length)];
  const wrong = shuffle(sibs.filter(x => !altNums.includes(x.num))).slice(0, 3).map(x => x.num);
  const opts = shuffle([correctNum, ...wrong]);
  return { q: `Which section is listed as an alternative offence in ${m.abbr} ${secLabel(s)}?`, opts: opts.map(n => "s " + n), correct: opts.indexOf(correctNum), why: `The section's own alternative-offence note lists s ${altNums.join(", s ")}.` };
}
let quizStreak = 0;
function openQuiz(act, s){
  closeQuiz();
  quizStreak = 0;
  const ov = el("div", { class:"quiz-ov", id:"quiz-ov", role:"dialog", "aria-modal":"true", "aria-label":"Section quiz" });
  const sheet = el("div", { class:"quiz-sheet" });
  const top = el("div", { class:"quiz-top" });
  top.innerHTML = `<span class="qz-title">${esc(act.meta.abbr)} ${esc(secLabel(s))} — quiz</span>`;
  const streakEl = el("span", { class:"qz-streak", "aria-live":"polite" }, "");
  top.appendChild(streakEl);
  const x = el("button", { class:"icon-btn", "aria-label":"Close quiz", onclick:closeQuiz });
  x.innerHTML = I.x; top.appendChild(x);
  sheet.appendChild(top);
  const body = el("div", { class:"quiz-body" });
  sheet.appendChild(body);
  ov.appendChild(sheet);
  ov.addEventListener("click", e => { if (e.target === ov) closeQuiz(); });
  document.addEventListener("keydown", quizEsc);
  document.body.appendChild(ov);
  nextQ(act, s, body, streakEl);
}
function quizEsc(e){ if (e.key === "Escape") { e.stopPropagation(); closeQuiz(); } }
function closeQuiz(){
  const ov = document.getElementById("quiz-ov");
  if (ov) ov.remove();
  document.removeEventListener("keydown", quizEsc);
}
function nextQ(act, s, body, streakEl){
  body.innerHTML = "";
  const q = makeQuestion(act, s);
  if (!q) { body.appendChild(el("p", { class:"qz-q" }, "Not enough material in this section for a quiz — try a larger section.")); return; }
  body.appendChild(el("p", { class:"qz-q" }, esc(q.q)));
  let answered = false;
  const opts = el("div", { class:"qz-opts" });
  q.opts.forEach((o, i) => {
    const b = el("button", { class:"qz-opt", onclick:() => {
      if (answered) return;
      answered = true; Haptics.tap();
      const right = i === q.correct;
      b.classList.add(right ? "right" : "wrong");
      opts.children[q.correct].classList.add("right");
      quizStreak = right ? quizStreak + 1 : 0;
      streakEl.textContent = quizStreak >= 2 ? `streak ${quizStreak}` : "";
      const fb = el("div", { class:"qz-fb " + (right ? "ok" : "no") });
      fb.innerHTML = `<b>${right ? "Correct." : "Not quite."}</b> ${esc(q.why)}`;
      body.appendChild(fb);
      const nx = el("button", { class:"qz-next", onclick:() => { Haptics.tap(); nextQ(act, s, body, streakEl); } }, "Next question");
      body.appendChild(nx); nx.focus();
    }}, esc(o));
    opts.appendChild(b);
  });
  body.appendChild(opts);
  const first = opts.querySelector("button"); if (first) first.focus();
}

/* ---------- theme ---------- */
function applyTheme(){
  const root = document.documentElement;
  if (settings.theme === "auto") root.removeAttribute("data-theme");
  else root.setAttribute("data-theme", settings.theme);
  const dark = settings.theme === "dark" || (settings.theme === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
  let m = document.querySelector('meta[name="theme-color"]:not([media])');
  if (!m) { m = document.createElement("meta"); m.name = "theme-color"; document.head.appendChild(m); }
  m.content = dark ? "#0a0b0e" : "#f3f4f7";
}

/* ---------- sidebar + dock ---------- */
const NAV = [["home","Home",I.home,"/home"],["topics","Topics",I.topics,"/topics"],["lib","Library",I.lib,"/acts"],["search","Search",I.search,"/search"],["saved","Saved",I.bookmark,"/saved"],["settings","Settings",I.gear,"/settings"]];
function buildSidebar(){
  const sb = $("#sidebar");
  sb.innerHTML = "";
  const brand = el("button", { class:"sb-brand", onclick:() => { Haptics.tap(); go("/home"); }, "aria-label":"Home" });
  brand.innerHTML = `<div class="mark" aria-hidden="true">§</div><div><span class="t">Legislation</span><span class="s">Western Australia</span></div>`;
  sb.appendChild(brand);
  const nav = el("div", { class:"sb-nav" });
  NAV.forEach(([k, label, ic, route]) => {
    const b = el("button", { "data-tab":k, onclick:() => { Haptics.tap(); go(route);
      if (k === "search") focusSearchSoon(); } });
    b.innerHTML = ic + `<span>${label}</span>` + (k === "search" ? '<span class="kbd-hint"><kbd>⌘K</kbd></span>' : "");
    nav.appendChild(b);
  });
  sb.appendChild(nav);
  sb.appendChild(el("div", { class:"sb-sec-label", id:"sb-ctx-label" }, "Acts"));
  sb.appendChild(el("div", { class:"sb-tree", id:"sb-tree" }));
  updateSidebarTree();
}
function updateSidebarTree(){
  const tree = $("#sb-tree"); if (!tree) return;
  const { seg, q } = parseHash();
  const actId = (seg[0] === "a" || seg[0] === "s" || seg[0] === "ch") && regById.has(seg[1]) ? seg[1] : null;
  const label = $("#sb-ctx-label");
  tree.innerHTML = "";
  if (actId && ACTS.has(actId)) {
    const act = ACTS.get(actId);
    label.textContent = act.meta.short;
    let curGrp = null;
    if (seg[0] === "s" && seg[2]) { const s = act.byId.get(seg[2]); curGrp = s && s.grp; }
    if (seg[0] === "a" && q && q.get("g")) curGrp = q.get("g");
    if (seg[0] === "ch" && seg[2]) { const c = act.chById.get(seg[2]); curGrp = c && c.grp; }
    act.tree.forEach(g => {
      const n = g.items.filter(i => i.k === "sec").length || countChSecs(act, g.items.filter(i => i.k === "ch"));
      const b = el("button", { class:"sb-item" + (curGrp === g.id ? " on" : ""), style:`--hue:${groupHue(act, g.id)}`, onclick:() => { Haptics.tap(); go(`/a/${actId}?g=${g.id}`); } });
      b.innerHTML = `<span class="dot"></span><span class="lab">${esc(g.label === "Provisions" ? g.title : g.label + " — " + g.title)}</span><span class="ct">${n}</span>`;
      tree.appendChild(b);
    });
  } else {
    label.textContent = "Acts";
    REG_ACTS.concat(REG_DOCS, REG_REFS).forEach(a => {
      const b = el("button", { class:"sb-item" + (actId === a.id ? " on" : ""), style:`--hue:${a.color}`, onclick:() => { Haptics.tap(); go("/a/" + a.id); } });
      b.innerHTML = `<span class="dot"></span><span class="lab">${esc(a.short)}</span><span class="ct">${a.n}</span>`;
      tree.appendChild(b);
    });
  }
}
function buildDock(){
  const dock = $("#dock");
  [["home","Home",I.home,"/home"],["topics","Topics",I.topics,"/topics"],["search","Search",I.search,"/search"],["lib","Library",I.lib,"/acts"],["saved","Saved",I.bookmark,"/saved"]].forEach(([k, label, ic, route]) => {
    const b = el("button", { class:"dock-btn", "data-tab":k, "aria-label":label, onclick:() => { Haptics.tap(); go(route);
      if (k === "search") focusSearchSoon(true); } });
    b.innerHTML = ic + `<span>${label}</span>`;
    dock.appendChild(b);
  });
}
function focusSearchSoon(onlyIfEmpty){
  setTimeout(() => {
    const i = document.querySelector("#view-search input");
    if (i && (!onlyIfEmpty || !i.value)) i.focus();
  }, 130);
}

/* ---------- render ---------- */
function render(){
  const { seg, q } = parseHash();
  const route = seg[0] || "home";
  if (currentRoute) scrollMem[currentRoute] = window.scrollY;
  const routeKey = location.hash;
  let title = "WA Legislation";
  if (route === "s" && seg[1] && seg[2]) {
    renderSection(seg[1], seg[2]); activate("section", "lib"); window.scrollTo(0, 0);
    const act = ACTS.get(seg[1]); const s = act && act.byId.get(seg[2]);
    if (s && act) title = `${secLabel(s)} ${s.t} · ${act.meta.abbr} · WA Legislation`;
  }
  else if (route === "ch" && seg[1] && seg[2]) {
    renderChapter(seg[1], seg[2]); activate("chapter", "lib"); window.scrollTo(0, 0);
    const act = ACTS.get(seg[1]); const c = act && act.chById.get(seg[2]);
    if (c) title = `${c.label} — ${c.title} · WA Legislation`;
  }
  else if (route === "a" && seg[1]) {
    renderAct(seg[1], q); activate("act", "lib"); window.scrollTo(0, scrollMem[currentRoute === "a" ? routeKey : routeKey] || 0);
    const a = regById.get(seg[1]); if (a) title = `${a.short} · WA Legislation`;
  }
  else if (route === "acts") { renderActs(); activate("acts", "lib"); window.scrollTo(0, scrollMem["acts"] || 0); title = "Library · WA Legislation"; }
  else if (route === "search") { renderSearch(q.get("q") || "", q.get("in") || undefined); activate("search", "search"); window.scrollTo(0, 0); title = "Search · WA Legislation"; }
  else if (route === "saved") { renderSaved(); activate("saved", "saved"); window.scrollTo(0, scrollMem["saved"] || 0); title = "Saved · WA Legislation"; }
  else if (route === "settings") { renderSettings(); activate("settings", "settings"); window.scrollTo(0, scrollMem["settings"] || 0); title = "Settings · WA Legislation"; }
  else if (route === "topics") { renderTopics(); activate("topics", "topics"); window.scrollTo(0, scrollMem["topics"] || 0); title = "Topics · WA Legislation"; }
  else if (route === "t" && seg[1]) {
    renderTopic(seg[1]); activate("topic", "topics"); window.scrollTo(0, 0);
    const t = topicById.get(seg[1]); if (t) title = `${t.name} · WA Legislation`;
  }
  else { renderHome(); activate("home", "home"); window.scrollTo(0, scrollMem["home"] || 0); }
  document.title = title;
  currentRoute = route === "a" ? routeKey : route;
  store.set("route", location.hash);
  updateSidebarTree();
}

/* ---------- keyboard ---------- */
function bindKeys(){
  document.addEventListener("keydown", e => {
    const typing = /input|textarea|select/i.test(document.activeElement.tagName);
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
      e.preventDefault(); go("/search"); focusSearchSoon(); return;
    }
    if (typing) return;
    if (e.key === "/") { e.preventDefault(); go("/search"); focusSearchSoon(); return; }
    const { seg } = parseHash();
    if (seg[0] === "s" && (e.key === "[" || e.key === "]")) {
      const act = ACTS.get(seg[1]); if (!act) return;
      const i = act.orderIdx.get(seg[2]); if (i === undefined) return;
      const n = e.key === "]" ? i + 1 : i - 1;
      if (n >= 0 && n < act.sections.length) { e.preventDefault(); go(`/s/${seg[1]}/${act.sections[n].id}`); }
    }
    if (e.key === "Escape" && history.length > 1 && seg[0] !== "home") history.back();
  });
}

/* ---------- boot ---------- */
function boot(){
  applyTheme();
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", applyTheme);
  const proxyWrap = el("div", { id:"haptic-proxy", inert:"" });
  const pid = "hp-" + Date.now();
  const sw = el("input", { type:"checkbox", id:pid, tabindex:"-1" });
  try { sw.setAttribute("switch", ""); } catch(e){}
  const lb = el("label", { for:pid });
  proxyWrap.appendChild(sw); proxyWrap.appendChild(lb);
  document.body.appendChild(proxyWrap);
  Haptics.proxy = lb;
  document.addEventListener("pointerdown", () => { Haptics.armed = true; }, { once:true, passive:true });
  buildDock(); buildSidebar();
  if (!location.hash) {
    const last = store.get("route", "#/home");
    location.replace(last && last.startsWith("#") ? last : "#/home");
  }
  const { seg } = parseHash();
  const firstAct = (seg[0] === "a" || seg[0] === "s" || seg[0] === "ch") && regById.has(seg[1]) ? seg[1] : "cc";
  render();
  hydrateAll(firstAct);
  bindKeys();
  bindSelectionCopy();
  document.addEventListener("act:loaded", () => {
    if (allLoaded()) updateSidebarTree();
  });
  if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
}
boot();
